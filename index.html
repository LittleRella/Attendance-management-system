<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Academic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item-active { background-color: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .card-shadow { box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .editable-input { 
            background: transparent; 
            border: 1px dashed transparent; 
            border-radius: 4px; 
            padding: 2px 4px;
            transition: all 0.2s;
        }
        .editable-input:hover { border-color: #cbd5e1; background: #f1f5f9; }
        .editable-input:focus { border-color: #2563eb; background: white; outline: none; border-style: solid; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-[280px] bg-[#0b0f1a] text-white fixed h-full flex flex-col p-8 z-40">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-500/30">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <h1 class="font-black text-2xl tracking-tighter text-white">ATTENDX</h1>
            </div>
            
            <nav class="space-y-1.5 flex-1">
                <button onclick="switchView('overview')" id="nav-overview" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Overview
                </button>
                <button onclick="switchView('courses')" id="nav-courses" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="book-open" class="w-5 h-5"></i> Manage Courses
                </button>
                <button onclick="switchView('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Compliance DB
                </button>
                <button onclick="switchView('registry')" id="nav-registry" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="users" class="w-5 h-5"></i> Student Registry
                </button>
                <button onclick="switchView('matrix')" id="nav-matrix" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i> Session Matrix
                </button>
            </nav>

            <div class="mt-auto">
                <button onclick="switchView('activate')" id="nav-activate" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-sm tracking-wide shadow-xl shadow-blue-900/40 flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i data-lucide="qr-code" class="w-5 h-5"></i> GENERATE QR
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="ml-[280px] flex-1 p-10">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="view-title" class="text-3xl font-black tracking-tight text-slate-900">Overview</h2>
                    <p id="view-desc" class="text-slate-400 font-medium text-sm mt-1">Academic tracking system.</p>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex bg-white border border-slate-200 rounded-2xl p-1 shadow-sm">
                        <div class="px-4 py-2 border-r border-slate-100 flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Year</span>
                            <select id="global-year-filter" onchange="updateGlobalFilters()" class="bg-transparent text-xs font-black outline-none cursor-pointer text-slate-900">
                                <option value="2023">2023</option>
                                <option value="2024" selected>2024</option>
                                <option value="2025">2025</option>
                            </select>
                        </div>
                        <div class="px-4 py-2 border-r border-slate-100 flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Semester</span>
                            <select id="global-semester-filter" onchange="updateGlobalFilters()" class="bg-transparent text-xs font-black outline-none cursor-pointer text-slate-900">
                                <option value="1">Sem 1</option>
                                <option value="2">Sem 2</option>
                                <option value="3">Sem 3</option>
                            </select>
                        </div>
                        <div class="px-4 py-2 flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Cohort</span>
                            <select id="global-cohort-filter" onchange="updateGlobalFilters()" class="bg-transparent text-xs font-black outline-none cursor-pointer text-blue-600">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                    </div>
                </div>
            </header>

            <div id="view-mount" class="fade-in"></div>
        </main>
    </div>

    <!-- Toast UI -->
    <div id="toast" class="fixed bottom-10 right-10 bg-[#0b0f1a] text-white px-8 py-5 rounded-2xl shadow-2xl flex items-center gap-4 transform translate-y-32 transition-transform duration-500 z-50 border border-white/5">
        <span id="toast-text" class="text-sm font-bold">Action Successful</span>
    </div>

    <script>
        // --- DATA STATE ---
        const ALL_COHORTS = ["MMBA 10", "MMBA 11", "EMBA 30", "EMBA 31", "MEMBA 13"];
        const SESSIONS_COUNT = 11;

        let courses = [
            { id: 'c1', code: 'BUS701', name: 'Strategic Management', semester: 1, year: 2024 },
            { id: 'c2', code: 'FIN702', name: 'Corporate Finance', semester: 1, year: 2024 },
            { id: 'c3', code: 'ECN705', name: 'Managerial Economics', semester: 2, year: 2024 },
            { id: 'c4', code: 'MKT710', name: 'Digital Marketing', semester: 2, year: 2024 },
            { id: 'c5', code: 'RES801', name: 'Research Methods', semester: 1, year: 2025 }
        ];

        let students = [
            { id: 's1', matric: '24/MMBA/001', fname: 'Sarah', lname: 'Ade', email: 'sarah.ade@uni-edu.ng', phone: '+234 802 345 6789', cohort: 'MMBA 10' },
            { id: 's2', matric: '24/EMBA/012', fname: 'John', lname: 'Doe', email: 'j.doe@corporate-mail.com', phone: '+234 810 123 4567', cohort: 'EMBA 30' },
            { id: 's3', matric: '24/MEM/045', fname: 'Grace', lname: 'Eze', email: 'grace.eze@student.uni.edu', phone: '+234 703 987 6543', cohort: 'MEMBA 13' },
            { id: 's4', matric: '24/MMBA/002', fname: 'David', lname: 'Okon', email: 'okon.david@gmail.com', phone: '+234 905 555 1234', cohort: 'MMBA 10' }
        ];

        let activeView = 'overview';
        let currentYear = "2024";
        let currentSemester = "1";
        let currentCohort = ALL_COHORTS[0];
        
        let genSession = 1;
        let genTimer = "15";

        function updateGlobalFilters() {
            currentYear = document.getElementById('global-year-filter').value;
            currentSemester = document.getElementById('global-semester-filter').value;
            currentCohort = document.getElementById('global-cohort-filter').value;
            switchView(activeView);
        }

        function initCohortDropdown() {
            const select = document.getElementById('global-cohort-filter');
            select.innerHTML = ALL_COHORTS.map(c => `<option value="${c}">${c}</option>`).join('');
            currentCohort = ALL_COHORTS[0];
        }

        // --- HANDLERS ---
        function updateStudentData(id, field, value) {
            const student = students.find(s => s.id === id);
            if (student) {
                student[field] = value.trim();
                showToast(`Updated ${field}`);
            }
        }

        function updateCourseData(id, field, value) {
            const course = courses.find(c => c.id === id);
            if (course) {
                course[field] = value.trim();
                showToast(`Updated ${field}`);
            }
        }

        function deleteCourse(id) {
            courses = courses.filter(c => c.id !== id);
            switchView('courses');
            showToast("Course Deleted");
        }

        function addCourse() {
            const newId = 'c' + Date.now();
            courses.push({
                id: newId,
                code: 'NEW101',
                name: 'New Course Title',
                semester: parseInt(currentSemester),
                year: parseInt(currentYear)
            });
            switchView('courses');
            showToast("New Course Added");
        }

        function downloadCSVTemplate() {
            const csvContent = "data:text/csv;charset=utf-8,Matric Number,First Name,Last Name,Email,Phone,Cohort\n24/MMBA/001,John,Doe,john@edu.com,+2348000000000,MMBA 10";
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "attendx_student_template.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Template Downloaded");
        }

        window.switchView = function(view) {
            activeView = view;
            const mount = document.getElementById('view-mount');
            const title = document.getElementById('view-title');
            const desc = document.getElementById('view-desc');
            
            document.querySelectorAll('aside nav button, aside .mt-auto button').forEach(b => b.classList.remove('sidebar-item-active'));
            const activeBtn = document.getElementById(`nav-${view}`);
            if (activeBtn) activeBtn.classList.add('sidebar-item-active');

            mount.innerHTML = "";
            const filteredCourses = courses.filter(c => c.year == currentYear && c.semester == currentSemester);
            
            if (view === 'overview') {
                title.innerText = "System Overview";
                desc.innerText = `${currentYear} | Semester ${currentSemester}`;
                renderOverview(mount, filteredCourses);
            } else if (view === 'courses') {
                title.innerText = "Course Management";
                desc.innerText = `Editing courses for ${currentYear} S${currentSemester}`;
                renderCourseManagement(mount, filteredCourses);
            } else if (view === 'dashboard') {
                title.innerText = "Compliance DB";
                desc.innerText = `Detailed Analysis for ${currentCohort}`;
                renderCompliance(mount, filteredCourses);
            } else if (view === 'registry') {
                title.innerText = "Student Registry";
                desc.innerText = `Full contact details for ${currentCohort}`;
                renderRegistry(mount);
            } else if (view === 'matrix') {
                title.innerText = "Session Matrix";
                desc.innerText = `Session-by-Session Grid (${currentYear} S${currentSemester})`;
                renderMatrix(mount, filteredCourses);
            } else if (view === 'activate') {
                title.innerText = "Generate QR";
                desc.innerText = "Classroom Admission Activation.";
                renderActivate(mount, filteredCourses);
            }
            lucide.createIcons();
        };

        function renderOverview(el, filteredCourses) {
            if (filteredCourses.length === 0) {
                el.innerHTML = `<div class="p-20 text-center bg-white rounded-[3rem] border border-dashed border-slate-200 text-slate-400 font-bold">No courses found for ${currentYear} Semester ${currentSemester}</div>`;
                return;
            }

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                        <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Attendance Trends</h4>
                        <div class="h-64"><canvas id="chart-overview"></canvas></div>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${filteredCourses.map(c => `
                            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 card-shadow flex items-center justify-between">
                                <div>
                                    <div class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${c.code}</div>
                                    <div class="font-black text-slate-900">${c.name}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-2xl font-black text-slate-900">${Math.floor(Math.random()*20)+75}%</div>
                                    <div class="text-[9px] font-bold text-slate-400 uppercase">Avg Yield</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;

            new Chart(document.getElementById('chart-overview'), {
                type: 'bar',
                data: {
                    labels: filteredCourses.map(c => c.code),
                    datasets: [{
                        data: filteredCourses.map(() => Math.floor(Math.random() * 40) + 60),
                        backgroundColor: '#2563eb', borderRadius: 10
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderCourseManagement(el, filteredCourses) {
            el.innerHTML = `
                <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
                    <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                        <h3 class="font-black text-lg">Curriculum Editor</h3>
                        <button onclick="addCourse()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-xs font-black flex items-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i> ADD COURSE
                        </button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <tr><th class="px-8 py-5">Course Code</th><th class="px-8 py-5">Full Title</th><th class="px-8 py-5">Actions</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${filteredCourses.map(c => `
                                <tr>
                                    <td class="px-8 py-6">
                                        <input type="text" value="${c.code}" class="editable-input font-mono font-bold text-blue-600 uppercase" onchange="updateCourseData('${c.id}', 'code', this.value)">
                                    </td>
                                    <td class="px-8 py-6">
                                        <input type="text" value="${c.name}" class="editable-input w-full font-bold text-slate-800" onchange="updateCourseData('${c.id}', 'name', this.value)">
                                    </td>
                                    <td class="px-8 py-6">
                                        <button onclick="deleteCourse('${c.id}')" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function renderRegistry(el) {
            const list = students.filter(s => s.cohort === currentCohort);
            el.innerHTML = `
                <div class="grid grid-cols-1 gap-6">
                    <div class="bg-white rounded-[2.5rem] border border-slate-100 card-shadow p-8 flex items-center justify-between">
                        <div class="flex items-center gap-6">
                            <div class="bg-blue-50 text-blue-600 p-4 rounded-2xl"><i data-lucide="upload-cloud" class="w-6 h-6"></i></div>
                            <div>
                                <h4 class="font-black text-lg">Bulk Enrollments</h4>
                                <p class="text-xs text-slate-400 text-medium">Contact data enabled for ${currentCohort}</p>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="downloadCSVTemplate()" class="px-6 py-3 border border-slate-200 rounded-xl text-xs font-black text-slate-600 hover:bg-slate-50 transition-all flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> TEMPLATE</button>
                            <button class="px-6 py-3 bg-slate-900 text-white rounded-xl text-xs font-black shadow-lg hover:bg-slate-800 flex items-center gap-2"><i data-lucide="file-up" class="w-4 h-4"></i> UPLOAD CSV</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="px-8 py-5">Full Name</th>
                                    <th class="px-8 py-5">Matric No.</th>
                                    <th class="px-8 py-5">Email Address</th>
                                    <th class="px-8 py-5">Phone Number</th>
                                    <th class="px-8 py-5 text-right">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${list.map(s => `
                                    <tr>
                                        <td class="px-8 py-6">
                                            <div class="flex gap-2">
                                                <input type="text" value="${s.fname}" class="editable-input font-black text-sm text-slate-900" onchange="updateStudentData('${s.id}', 'fname', this.value)">
                                                <input type="text" value="${s.lname}" class="editable-input font-black text-sm text-slate-900" onchange="updateStudentData('${s.id}', 'lname', this.value)">
                                            </div>
                                        </td>
                                        <td class="px-8 py-6 font-mono text-[10px] text-slate-500">${s.matric}</td>
                                        <td class="px-8 py-6">
                                            <input type="email" value="${s.email}" class="editable-input text-xs font-medium text-slate-600 w-full" onchange="updateStudentData('${s.id}', 'email', this.value)">
                                        </td>
                                        <td class="px-8 py-6">
                                            <input type="text" value="${s.phone}" class="editable-input text-xs font-mono font-medium text-slate-600" onchange="updateStudentData('${s.id}', 'phone', this.value)">
                                        </td>
                                        <td class="px-8 py-6 text-right">
                                            <span class="px-3 py-1 bg-green-50 text-green-600 text-[9px] font-black rounded-lg uppercase">Enrolled</span>
                                        </td>
                                    </tr>
                                `).join('')}
                                ${list.length === 0 ? '<tr><td colspan="5" class="p-12 text-center text-slate-400 italic">No students in this cohort registry.</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        function renderMatrix(el, filteredCourses) {
            if (filteredCourses.length === 0) { el.innerHTML = "No courses found."; return; }
            const activeCourse = filteredCourses[0];
            const list = students.filter(s => s.cohort === currentCohort);

            el.innerHTML = `
                <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 p-8 overflow-x-auto">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h3 class="font-black text-xl text-slate-900">${activeCourse.code} Matrix</h3>
                            <p class="text-xs text-slate-400 font-medium">Session-by-session detailed tracking</p>
                        </div>
                        <div class="flex gap-2">
                             <div class="flex items-center gap-2 mr-4">
                                <div class="w-3 h-3 rounded bg-green-500"></div> <span class="text-[10px] font-black text-slate-400 uppercase">Present</span>
                             </div>
                             <div class="flex items-center gap-2">
                                <div class="w-3 h-3 rounded bg-slate-100"></div> <span class="text-[10px] font-black text-slate-400 uppercase">Absent</span>
                             </div>
                        </div>
                    </div>
                    
                    <div class="min-w-[1000px]">
                        <div class="flex border-b pb-5 mb-4 text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-50/50 p-4 rounded-xl">
                            <div class="w-64">Student Details</div>
                            <div class="flex-1 flex justify-between px-4">
                                ${Array.from({length: SESSIONS_COUNT}, (_,i)=>`<div class="w-10 text-center">S${i+1}</div>`).join('')}
                            </div>
                        </div>
                        <div class="space-y-1">
                            ${list.map(s => `
                                <div class="flex py-3 px-4 items-center hover:bg-slate-50 rounded-xl transition-colors">
                                    <div class="w-64">
                                        <div class="font-black text-xs text-slate-900">${s.fname} ${s.lname}</div>
                                        <div class="text-[10px] font-mono text-slate-400">${s.matric}</div>
                                    </div>
                                    <div class="flex-1 flex justify-between px-4">
                                        ${Array.from({length: SESSIONS_COUNT}, (_, i)=>`
                                            <div class="w-10 flex justify-center">
                                                <div class="w-8 h-8 rounded-lg ${Math.random() > 0.15 ? 'bg-green-50 text-green-600' : 'bg-slate-100 text-slate-300'} flex items-center justify-center text-[10px] font-black shadow-sm">
                                                    ${Math.random() > 0.15 ? '✓' : '—'}
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
        }

        function renderActivate(el, filteredCourses) {
            const course = filteredCourses[0] || { code: 'N/A', name: 'Select Context' };
            const cohortStudents = students.filter(s => s.cohort === currentCohort);

            el.innerHTML = `
                <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 card-shadow space-y-8 h-fit">
                        <div>
                            <h3 class="text-xl font-black mb-1">Session Protocol</h3>
                            <p class="text-xs text-slate-400 font-medium tracking-tight">Generate unique access for ${currentCohort}</p>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Target Course</label>
                                <select class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-black text-sm outline-none">
                                    ${filteredCourses.map(c => `<option>${c.code} - ${c.name}</option>`).join('')}
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Session #</label>
                                    <select onchange="genSession=this.value; switchView('activate')" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-black text-sm outline-none">
                                        ${Array.from({length: SESSIONS_COUNT}, (_,i)=>`<option value="${i+1}" ${genSession == i+1 ? 'selected' : ''}>Session ${i+1}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Auto-Close</label>
                                    <select onchange="genTimer=this.value; switchView('activate')" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-black text-sm outline-none">
                                        <option value="5" ${genTimer === '5' ? 'selected' : ''}>5 Mins</option>
                                        <option value="15" ${genTimer === '15' ? 'selected' : ''}>15 Mins</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <button onclick="showToast('Broadcast Started')" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-[2rem] font-black text-sm shadow-xl transition-all active:scale-95">ACTIVATE SESSION</button>
                    </div>

                    <div class="bg-slate-900 rounded-[3rem] p-10 text-white flex flex-col items-center justify-center text-center">
                        <div class="bg-white p-6 rounded-[2.5rem] mb-8 shadow-2xl"><i data-lucide="qr-code" class="w-40 h-40 text-slate-900"></i></div>
                        <div class="space-y-2">
                            <div class="text-3xl font-black tracking-tighter">${course.code}</div>
                            <div class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em]">Session ${genSession} • ${currentCohort}</div>
                        </div>
                    </div>

                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 card-shadow">
                        <div class="mb-6 flex items-center gap-3">
                            <div class="bg-blue-100 p-2 rounded-lg text-blue-600"><i data-lucide="smartphone" class="w-5 h-5"></i></div>
                            <h4 class="font-black text-sm uppercase tracking-widest text-slate-400">Student Device View</h4>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 space-y-6">
                            <p class="text-xs font-bold text-slate-600">You are attending: <br><span class="text-slate-900 font-black">${course.name}</span></p>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Select Your Name</label>
                                <select id="student-self-select" class="w-full bg-white border border-slate-200 p-4 rounded-2xl font-black text-sm outline-none text-slate-900 shadow-sm">
                                    <option value="">Choose name...</option>
                                    ${cohortStudents.map(s => `<option value="${s.id}">${s.fname} ${s.lname}</option>`).join('')}
                                </select>
                            </div>
                            <button onclick="submitAttendance()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-xs hover:bg-black transition-all">SUBMIT ATTENDANCE</button>
                        </div>
                    </div>
                </div>`;
        }

        function submitAttendance() {
            const select = document.getElementById('student-self-select');
            if (!select || !select.value) { showToast("Please select your name"); return; }
            showToast("Attendance Marked Successfully!");
            select.value = "";
        }

        function renderCompliance(el, filteredCourses) {
            const list = students.filter(s => s.cohort === currentCohort);
            el.innerHTML = `
                <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <tr><th class="px-8 py-5">Student</th><th class="px-8 py-5">Matrix Status</th><th class="px-8 py-5 text-right">Compliance</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${list.map(s => `
                                <tr>
                                    <td class="px-8 py-6">
                                        <div class="font-black text-sm text-slate-900">${s.fname} ${s.lname}</div>
                                        <div class="text-[10px] text-slate-400 font-bold uppercase">${s.matric}</div>
                                    </td>
                                    <td class="px-8 py-6 flex gap-1">${filteredCourses.map(() => `<div class="w-2 h-2 rounded-full bg-green-500"></div>`).join('')}</td>
                                    <td class="px-8 py-6 text-right"><span class="px-3 py-1 bg-blue-50 text-blue-600 text-[9px] font-black rounded-lg uppercase">Good Standing</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = m;
            t.classList.remove('translate-y-32');
            setTimeout(() => t.classList.add('translate-y-32'), 3000);
        }

        window.onload = () => {
            initCohortDropdown();
            switchView('overview');
        };
    </script>
</body>
</html>
