<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Attendance Management System</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scan-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(240px); }
        }
        .scan-line { animation: scan-bounce 2s infinite ease-in-out; }

        .chart-bar { animation: grow-up 1s ease-out forwards; }
        @keyframes grow-up {
            from { height: 0; }
            to { height: var(--target-height); }
        }

        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 12px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white p-6 fixed h-full flex flex-col border-r border-slate-800 z-30">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="user-check" class="w-6 h-6"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight">AttendX</h1>
            </div>
            
            <nav class="space-y-2 flex-1 overflow-y-auto">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Dashboard</span>
                </button>
                <button onclick="switchView('courses')" id="btn-courses" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Courses</span>
                </button>
                <button onclick="switchView('students')" id="btn-students" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Students</span>
                </button>
                <button onclick="switchView('sessions')" id="btn-sessions" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Sessions</span>
                </button>
                <div class="pt-4 pb-2 px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Integrations</div>
                <button onclick="switchView('zoom')" id="btn-zoom" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="video" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Zoom Reports</span>
                </button>
            </nav>

            <div class="mt-auto pt-4 border-t border-slate-800">
                <button onclick="switchView('scanner')" id="btn-scanner" class="nav-link w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-sm font-medium border border-slate-700 transition-colors">
                    <i data-lucide="qr-code" class="w-4 h-4"></i>
                    Student Scan Mode
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="ml-64 flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="page-title" class="text-2xl font-bold text-slate-800">Admin Dashboard</h2>
                    <p id="page-subtitle" class="text-slate-500 text-sm">Real-time attendance tracking & analytics.</p>
                </div>
                <div id="header-actions" class="flex gap-3">
                    <input type="file" id="excel-upload" class="hidden" accept=".csv, .xlsx, .xls" onchange="handleFileUpload(event)">
                    <button onclick="document.getElementById('excel-upload').click()" class="flex items-center gap-2 bg-white px-4 py-2 border rounded-lg text-sm font-medium hover:bg-slate-50 transition-all shadow-sm">
                        <i data-lucide="file-up" class="w-4 h-4 text-green-600"></i>
                        Upload Student Sheet
                    </button>
                    <button onclick="openCreateCourseModal()" class="flex items-center gap-2 bg-blue-600 px-4 py-2 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-lg transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        Add Course
                    </button>
                </div>
            </div>

            <div id="view-container" class="fade-in"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="course-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 transform transition-all scale-95 opacity-0" id="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Create New Course</h3>
                <button onclick="closeCreateCourseModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-4">
                <input type="text" id="new-course-code" placeholder="Course Code (e.g. CS101)" class="w-full border rounded-xl px-4 py-3 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="new-course-name" placeholder="Course Title" class="w-full border rounded-xl px-4 py-3 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="new-course-instructor" placeholder="Instructor Name" class="w-full border rounded-xl px-4 py-3 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="saveCourse()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">Create Course</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-24 transition-transform duration-300 z-50 border border-slate-700">
        <i data-lucide="check-circle" id="toast-icon" class="text-green-400 w-5 h-5"></i>
        <span id="toast-text" class="text-sm font-medium">Action successful!</span>
    </div>

    <script>
        // --- STATE ---
        let students = [
            { id: '2024-001', name: 'Alice Smith', email: 'alice@uni.edu', rate: 92, lastSeen: '10 mins ago', course: 'CS101' },
            { id: '2024-002', name: 'Bob Johnson', email: 'bob@uni.edu', rate: 88, lastSeen: '2 hours ago', course: 'CS101' },
            { id: '2024-003', name: 'Charlie Brown', email: 'charlie@uni.edu', rate: 45, lastSeen: '1 day ago', course: 'PHY201' },
            { id: '2024-004', name: 'Diana Prince', email: 'diana@uni.edu', rate: 98, lastSeen: 'Now', course: 'MATH301' }
        ];

        let courses = [
            { code: 'CS101', name: 'Intro to Computer Science', instructor: 'Dr. Alan Turing', students: 45 },
            { code: 'PHY201', name: 'Applied Physics', instructor: 'Dr. Marie Curie', students: 32 },
            { code: 'MATH301', name: 'Advanced Calculus', instructor: 'Prof. Isaac Newton', students: 28 }
        ];

        let activeSession = null;
        let logs = [];

        // --- NAVIGATION ---
        function switchView(view) {
            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            const headerActions = document.getElementById('header-actions');
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('bg-blue-600', 'text-white', 'bg-slate-800');
                link.classList.add('text-slate-400', 'hover:bg-slate-800', 'hover:text-white');
            });

            headerActions.style.display = (view === 'scanner' || view === 'active-session') ? 'none' : 'flex';

            if (view === 'dashboard') {
                title.innerText = "Admin Dashboard";
                subtitle.innerText = "Real-time attendance tracking & analytics.";
                document.getElementById('btn-dashboard').classList.add('bg-blue-600', 'text-white');
                renderDashboard(container);
            } else if (view === 'courses') {
                title.innerText = "Course Management";
                subtitle.innerText = "Organize modules and manage enrollment.";
                document.getElementById('btn-courses').classList.add('bg-blue-600', 'text-white');
                renderCourses(container);
            } else if (view === 'students') {
                title.innerText = "Student Registry";
                subtitle.innerText = "Manage student records and performance.";
                document.getElementById('btn-students').classList.add('bg-blue-600', 'text-white');
                renderStudents(container);
            } else if (view === 'sessions') {
                title.innerText = "Attendance Sessions";
                subtitle.innerText = "Generate live check-in windows.";
                document.getElementById('btn-sessions').classList.add('bg-blue-600', 'text-white');
                renderSessions(container);
            } else if (view === 'zoom') {
                title.innerText = "Zoom Integration";
                subtitle.innerText = "Import attendance from Zoom meeting reports.";
                document.getElementById('btn-zoom').classList.add('bg-blue-600', 'text-white');
                renderZoom(container);
            } else if (view === 'scanner') {
                title.innerText = "Check-in Terminal";
                document.getElementById('btn-scanner').classList.add('bg-slate-800', 'text-white');
                renderScanner(container);
            } else if (view === 'active-session') {
                title.innerText = "Live Session QR";
                subtitle.innerText = "Students should scan the code below.";
                renderActiveQR(container);
            }
            
            lucide.createIcons();
        }

        // --- RENDERERS ---
        function renderDashboard(el) {
            const totalAttendance = logs.length;
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-sm mb-1 font-medium">Scans Today</p>
                        <h3 class="text-3xl font-bold text-blue-600">${totalAttendance}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-sm mb-1 font-medium">Active Courses</p>
                        <h3 class="text-3xl font-bold">${courses.length}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-sm mb-1 font-medium">System Health</p>
                        <h3 class="text-3xl font-bold text-green-500">Online</h3>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="font-bold">Recent Activity</h4>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Live Log</span>
                    </div>
                    ${logs.length === 0 ? '<p class="text-slate-400 text-sm italic">No records yet.</p>' : `
                        <div class="space-y-3">
                            ${logs.slice(0, 5).map(log => `
                                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 ${log.method === 'zoom' ? 'bg-indigo-100 text-indigo-600' : 'bg-blue-100 text-blue-600'} rounded-full flex items-center justify-center text-xs font-bold">
                                            <i data-lucide="${log.method === 'zoom' ? 'video' : 'qr-code'}" class="w-4 h-4"></i>
                                        </div>
                                        <div>
                                            <p class="text-sm font-bold">${log.studentName}</p>
                                            <p class="text-[10px] text-slate-400">${log.courseCode} • ${log.time} • ${log.method.toUpperCase()}</p>
                                        </div>
                                    </div>
                                    <span class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded">VERIFIED</span>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        function renderZoom(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-3xl border shadow-sm">
                        <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-6">
                            <i data-lucide="file-text" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">Process Meeting Report</h3>
                        <p class="text-slate-500 text-sm mb-8 leading-relaxed">Upload a Zoom Participant Report (CSV) to sync online attendance. We match participants based on name and email.</p>
                        
                        <div class="space-y-4 mb-8">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">1. Target Course</label>
                                <select id="zoom-target-course" class="w-full border rounded-xl px-4 py-3 bg-slate-50 outline-none">
                                    ${courses.map(c => `<option value="${c.code}">${c.code} - ${c.name}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">2. Upload Report</label>
                                <div class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center hover:border-indigo-400 transition-colors cursor-pointer group" onclick="document.getElementById('zoom-csv').click()">
                                    <input type="file" id="zoom-csv" class="hidden" accept=".csv" onchange="handleZoomReport(event)">
                                    <i data-lucide="upload-cloud" class="w-10 h-10 text-slate-300 group-hover:text-indigo-500 mx-auto mb-3 transition-colors"></i>
                                    <p class="text-sm font-bold text-slate-600" id="zoom-file-status">Click to select CSV file</p>
                                    <p class="text-xs text-slate-400 mt-1">Files should contain Name and Email columns</p>
                                </div>
                            </div>
                        </div>

                        <button id="btn-process-zoom" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 disabled:bg-slate-300 disabled:shadow-none" disabled>
                            Sync Attendance Records
                        </button>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl">
                            <h4 class="font-bold mb-4 flex items-center gap-2">
                                <i data-lucide="help-circle" class="w-4 h-4 text-indigo-400"></i>
                                How it works
                            </h4>
                            <ul class="space-y-4 text-sm text-slate-400">
                                <li class="flex gap-3">
                                    <span class="text-indigo-400 font-bold">01</span>
                                    <span>Download the "Usage Report" from your Zoom Admin dashboard.</span>
                                </li>
                                <li class="flex gap-3">
                                    <span class="text-indigo-400 font-bold">02</span>
                                    <span>Upload the CSV here and select the appropriate course code.</span>
                                </li>
                                <li class="flex gap-3">
                                    <span class="text-indigo-400 font-bold">03</span>
                                    <span>AttendX matches zoom display names with your enrolled students.</span>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="bg-white p-6 rounded-3xl border shadow-sm">
                            <h4 class="font-bold mb-4">Integration History</h4>
                            <div id="zoom-history" class="space-y-3">
                                <p class="text-xs text-slate-400 italic">No reports imported yet.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderActiveQR(el) {
            if (!activeSession) return switchView('sessions');
            el.innerHTML = `
                <div class="max-w-xl mx-auto flex flex-col items-center">
                    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center w-full mb-8">
                        <div class="mb-6">
                            <h3 class="text-2xl font-bold text-slate-800">${activeSession.courseCode}</h3>
                            <p class="text-slate-400 font-medium">In-Person Session Active</p>
                        </div>
                        <div id="qrcode" class="mb-8 p-4 bg-slate-50 rounded-3xl inline-block"></div>
                        <div class="grid grid-cols-2 gap-4 text-left">
                            <div class="p-4 bg-blue-50 rounded-2xl">
                                <p class="text-[10px] font-bold text-blue-400 uppercase">Timer</p>
                                <p class="text-xl font-bold text-blue-600" id="timer">--:--</p>
                            </div>
                            <div class="p-4 bg-slate-50 rounded-2xl">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Check-ins</p>
                                <p class="text-xl font-bold text-slate-800" id="session-count">0</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="endSession()" class="text-slate-400 hover:text-red-500 font-bold text-sm transition-colors">Terminate Session</button>
                </div>
            `;
            setTimeout(() => {
                const qrContainer = document.getElementById("qrcode");
                qrContainer.innerHTML = "";
                new QRCode(qrContainer, {
                    text: activeSession.token,
                    width: 256, height: 256,
                    colorDark : "#0f172a", colorLight : "#f8fafc",
                    correctLevel : QRCode.CorrectLevel.H
                });
                startTimer(activeSession.duration * 60);
            }, 100);
        }

        function renderSessions(el) {
            el.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-8 rounded-3xl border shadow-xl text-center">
                    <div class="bg-blue-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-600">
                        <i data-lucide="zap" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-6 text-slate-800">New Physical Session</h3>
                    <div class="space-y-4 text-left mb-8">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Target Course</label>
                            <select id="session-course" class="w-full border rounded-xl px-4 py-3 bg-slate-50 outline-none">
                                ${courses.map(c => `<option value="${c.code}">${c.code} - ${c.name}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Duration (Min)</label>
                            <input type="number" id="session-duration" value="15" class="w-full border rounded-xl px-4 py-3 bg-slate-50 outline-none">
                        </div>
                    </div>
                    <button onclick="startSession()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">Start Session</button>
                </div>
            `;
        }

        function renderCourses(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${courses.map(c => `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm group">
                            <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors mb-4">
                                <i data-lucide="book" class="w-5 h-5"></i>
                            </div>
                            <h4 class="font-bold text-slate-800 mb-1">${c.name}</h4>
                            <p class="text-[10px] text-slate-400 mb-4 font-mono font-bold">${c.code}</p>
                            <div class="flex justify-between items-center pt-4 border-t">
                                <span class="text-[10px] font-bold text-slate-400 uppercase">${c.students} Students</span>
                                <button onclick="quickStart('${c.code}')" class="text-xs font-bold text-blue-600">Start Session</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderStudents(el) {
            el.innerHTML = `
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Student</th>
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Course</th>
                                <th class="px-6 py-4">Attendance Rate</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y text-sm">
                            ${students.map(s => `
                                <tr>
                                    <td class="px-6 py-4 font-bold text-slate-800">${s.name}<br><span class="text-[10px] font-normal text-slate-400">${s.email}</span></td>
                                    <td class="px-6 py-4 font-mono text-slate-500">${s.id}</td>
                                    <td class="px-6 py-4 font-bold text-slate-400">${s.course}</td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-2">
                                            <div class="w-20 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                <div class="h-full ${s.rate > 75 ? 'bg-green-500' : 'bg-red-500'}" style="width: ${s.rate}%"></div>
                                            </div>
                                            <span class="font-bold text-xs">${s.rate}%</span>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderScanner(el) {
            el.innerHTML = `
                <div class="max-w-sm mx-auto bg-slate-900 rounded-[3rem] p-4 border-[8px] border-slate-800 shadow-2xl relative overflow-hidden h-[600px]">
                    <div class="absolute top-4 left-1/2 -translate-x-1/2 w-20 h-6 bg-slate-800 rounded-full z-10"></div>
                    <div class="bg-black w-full h-full rounded-[2.2rem] flex flex-col items-center justify-center p-8 text-white relative">
                        <div class="w-64 h-64 border-2 border-blue-500/30 rounded-3xl relative mb-12 flex items-center justify-center mx-auto overflow-hidden bg-slate-800/20">
                            <i data-lucide="camera" class="w-12 h-12 text-white/10"></i>
                            <div class="scan-line absolute inset-x-4 h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]"></div>
                        </div>
                        <h4 class="text-xl font-bold mb-2">Check-in Ready</h4>
                        <p class="text-slate-500 text-sm mb-12 text-center">Scan the classroom QR to mark yourself present.</p>
                        <button onclick="simulateScan()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/20">Simulate Scan</button>
                    </div>
                </div>
            `;
        }

        // --- ZOOM LOGIC ---
        function handleZoomReport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('zoom-file-status').innerText = `Selected: ${file.name}`;
            const btn = document.getElementById('btn-process-zoom');
            btn.disabled = false;
            btn.onclick = () => processZoomReport(file);
        }

        function processZoomReport(file) {
            const courseCode = document.getElementById('zoom-target-course').value;
            const btn = document.getElementById('btn-process-zoom');
            btn.innerText = "Syncing...";
            btn.disabled = true;

            setTimeout(() => {
                // Simulate matching report data to our students
                const matched = students.filter(s => s.course === courseCode || Math.random() > 0.5).slice(0, 3);
                
                matched.forEach(student => {
                    logs.unshift({
                        studentName: student.name,
                        courseCode: courseCode,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        method: 'zoom'
                    });
                    // Slightly increase attendance rate
                    student.rate = Math.min(100, student.rate + 1);
                });

                showToast(`Success: Synced ${matched.length} students from Zoom report.`);
                switchView('dashboard');
            }, 1500);
        }

        // --- SESSION LOGIC ---
        function startSession() {
            const code = document.getElementById('session-course').value;
            const duration = document.getElementById('session-duration').value;
            activeSession = {
                courseCode: code,
                duration: parseInt(duration),
                token: `SECURE_${Date.now()}_${code}`,
                attendees: 0
            };
            switchView('active-session');
            showToast(`Session live for ${code}`);
        }

        function quickStart(code) {
            activeSession = {
                courseCode: code,
                duration: 15,
                token: `SECURE_${Date.now()}_${code}`,
                attendees: 0
            };
            switchView('active-session');
        }

        function endSession() {
            activeSession = null;
            switchView('sessions');
        }

        function simulateScan() {
            if (!activeSession) return showToast("No active session found.");
            const student = students[Math.floor(Math.random() * students.length)];
            logs.unshift({
                studentName: student.name,
                courseCode: activeSession.courseCode,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                method: 'qr'
            });
            activeSession.attendees++;
            const countEl = document.getElementById('session-count');
            if (countEl) countEl.innerText = activeSession.attendees;
            showToast(`${student.name} scanned successfully!`);
        }

        function startTimer(seconds) {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                if (!activeSession || seconds <= 0) {
                    clearInterval(interval);
                    if (seconds <= 0) endSession();
                    return;
                }
                seconds--;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                timerEl.innerText = `${m}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // --- HELPERS ---
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            toast.classList.remove('translate-y-24');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('translate-y-24');
            }, 3000);
        }

        function openCreateCourseModal() {
            document.getElementById('course-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.remove('scale-95', 'opacity-0'), 10);
        }

        function closeCreateCourseModal() {
            document.getElementById('modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('course-modal').classList.add('hidden'), 200);
        }

        function saveCourse() {
            const code = document.getElementById('new-course-code').value;
            const name = document.getElementById('new-course-name').value;
            const instructor = document.getElementById('new-course-instructor').value;
            if (code && name) {
                courses.push({ code, name, instructor, students: 0 });
                closeCreateCourseModal();
                switchView('courses');
                showToast(`Course ${code} created.`);
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                showToast(`Importing students from ${file.name}...`);
                setTimeout(() => {
                    students.push({ id: '2024-X', name: 'Imported Student', email: 'imported@uni.edu', rate: 100, lastSeen: 'Just now', course: 'CS101' });
                    switchView('students');
                }, 1000);
            }
        }

        window.onload = () => switchView('dashboard');
    </script>
</body>
</html>
