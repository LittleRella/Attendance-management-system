<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Management Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { margin: 0; padding: 0; min-height: 100vh; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Using global variables provided by the CDN scripts
        const { useState, useEffect } = React;
        
        // Icon Helper for browser-based React
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeView, setActiveView] = useState('overview');
            const [isLive, setIsLive] = useState(false);
            const [currentAttendees, setCurrentAttendees] = useState([]);

            const students = [
                { id: 1, name: 'Sarah Ade', matric: '24/MMBA/001' },
                { id: 2, name: 'John Doe', matric: '24/EMBA/012' },
                { id: 3, name: 'Amaka Okonkwo', matric: '24/MMBA/045' },
                { id: 4, name: 'Bello Musa', matric: '24/MEMBA/003' }
            ];

            const toggleAttendee = (id) => {
                setCurrentAttendees(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950 text-white">
                        <div className="text-center p-10 bg-white/5 rounded-3xl border border-white/10">
                            <h1 className="text-4xl font-black mb-6">AttendX Portal</h1>
                            <button onClick={() => setIsLoggedIn(true)} className="bg-white text-black px-8 py-4 rounded-xl font-bold">Login to Dashboard</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-72 bg-slate-950 text-white p-8 flex flex-col fixed h-full">
                        <h1 className="text-2xl font-black mb-10 tracking-tighter">AttendX</h1>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => {setActiveView('overview'); setIsLive(false)}} className={`w-full flex items-center gap-3 p-3 rounded-lg ${activeView === 'overview' && !isLive ? 'bg-blue-600' : 'text-slate-400 hover:text-white'}`}><Icon name="layout-dashboard" /> Overview</button>
                            <button onClick={() => {setActiveView('registry'); setIsLive(false)}} className={`w-full flex items-center gap-3 p-3 rounded-lg ${activeView === 'registry' && !isLive ? 'bg-blue-600' : 'text-slate-400 hover:text-white'}`}><Icon name="users" /> Registry</button>
                            <button onClick={() => setIsLive(true)} className={`w-full flex items-center gap-3 p-3 rounded-lg ${isLive ? 'bg-emerald-600' : 'text-slate-400 hover:text-white'}`}><Icon name="radio" /> Live Session</button>
                        </nav>
                        <button onClick={() => setIsLoggedIn(false)} className="text-slate-500 font-bold flex items-center gap-2 hover:text-white"><Icon name="log-out" /> Logout</button>
                    </aside>

                    {/* Content */}
                    <main className="ml-72 flex-1 p-10">
                        {isLive ? (
                            <div className="space-y-6">
                                <h2 className="text-3xl font-black">Live Session Active</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {students.map(s => (
                                        <div key={s.id} onClick={() => toggleAttendee(s.id)} className={`p-6 rounded-2xl border cursor-pointer ${currentAttendees.includes(s.id) ? 'bg-emerald-100 border-emerald-500' : 'bg-white'}`}>
                                            <p className="font-bold">{s.name}</p>
                                            <p className="text-sm text-slate-500">{s.matric}</p>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setIsLive(false)} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">End Session</button>
                            </div>
                        ) : (
                            <div className="bg-white p-10 rounded-3xl border shadow-sm">
                                <h2 className="text-3xl font-black mb-4">Dashboard: {activeView.toUpperCase()}</h2>
                                <p className="text-slate-600">Welcome to the AttendX Management Portal.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
