<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Dynamic QR Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .session-dot { width: 10px; height: 10px; border-radius: 2px; }
        .present { background-color: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .absent { background-color: #e2e8f0; }
        .session-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
        
        .qr-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }
        #qrcode img { margin: 0 auto; border: 12px solid white; border-radius: 24px; }
        
        .timer-animate { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-950 text-white p-6 fixed h-full flex flex-col z-30">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/40"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
                <h1 class="font-black text-xl tracking-tighter">ATTENDX</h1>
            </div>
            
            <nav class="space-y-1 flex-1">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Dashboard</span>
                </button>
                <button onclick="switchView('students')" id="btn-students" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="contact-2" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Registry</span>
                </button>
                <button onclick="switchView('matrix')" id="btn-matrix" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Session Matrix</span>
                </button>
            </nav>

            <div class="mt-auto space-y-4">
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3">Admin Data Tools</p>
                    <button onclick="downloadCSVTemplate()" class="w-full flex items-center gap-2 text-xs text-blue-400 font-bold mb-3 hover:text-blue-300">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> Download Template
                    </button>
                    <button onclick="document.getElementById('csv-upload').click()" class="w-full flex items-center gap-2 text-xs text-slate-400 font-bold hover:text-white">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i> Upload CSV
                    </button>
                    <input type="file" id="csv-upload" class="hidden" accept=".csv" onchange="handleCSVImport(event)">
                </div>
                <button onclick="switchView('qr-launcher')" id="btn-qr" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-sm font-black shadow-xl shadow-blue-900/40 transition-all active:scale-95">
                    <i data-lucide="qr-code" class="w-5 h-5"></i> ACTIVATE QR
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="ml-64 flex-1 p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-black text-slate-900 tracking-tight">Dashboard</h2>
                    <p id="page-subtitle" class="text-slate-400 text-sm font-medium">Monitoring academic compliance and engagement.</p>
                </div>
                <div class="flex items-center gap-3">
                    <select id="global-course-filter" onchange="refreshView()" class="bg-white border-2 border-slate-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-blue-600 transition-all cursor-pointer">
                        <option value="ALL">All Courses</option>
                        <option value="CSC101">CSC101 - Computer Science</option>
                        <option value="PHY201">PHY201 - Applied Physics</option>
                        <option value="GST111">GST111 - Communication</option>
                    </select>
                </div>
            </header>

            <div id="view-container" class="fade-in"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-950/70 backdrop-blur-md z-50 flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-10 transform transition-all scale-95 opacity-0" id="modal-body"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-[1.5rem] shadow-2xl flex items-center gap-4 transform translate-y-32 transition-transform duration-500 z-50 border border-slate-800">
        <div class="bg-blue-500 p-1.5 rounded-lg"><i data-lucide="bell" class="w-4 h-4"></i></div>
        <span id="toast-text" class="text-sm font-bold">Action successful</span>
    </div>

    <script>
        // --- DATA STORE ---
        let students = [
            { matric: '24/CSC/001', firstName: 'Faith', lastName: 'Okon', email: 'faith@edu.com', phone: '0801', pic: 'https://i.pravatar.cc/150?u=1', course: 'CSC101', sessions: Array(22).fill(0) },
            { matric: '24/CSC/002', firstName: 'John', lastName: 'Smith', email: 'john@edu.com', phone: '0802', pic: 'https://i.pravatar.cc/150?u=2', course: 'CSC101', sessions: Array(22).fill(0) },
            { matric: '24/PHY/005', firstName: 'Amara', lastName: 'Cole', email: 'amara@edu.com', phone: '0803', pic: 'https://i.pravatar.cc/150?u=3', course: 'PHY201', sessions: Array(22).fill(0) }
        ];

        let activeView = 'dashboard';
        let liveSession = null; // { course: string, sessionIndex: number, expiry: timestamp }
        let timerInterval = null;

        // --- NAVIGATION ---
        function switchView(view) {
            activeView = view;
            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('bg-blue-600', 'text-white'));
            
            if (view === 'dashboard') {
                title.innerText = "Dashboard Overview";
                document.getElementById('btn-dashboard').classList.add('bg-blue-600', 'text-white');
                renderDashboard(container);
            } else if (view === 'students') {
                title.innerText = "Registry Management";
                document.getElementById('btn-students').classList.add('bg-blue-600', 'text-white');
                renderRegistry(container);
            } else if (view === 'matrix') {
                title.innerText = "Attendance Matrix";
                document.getElementById('btn-matrix').classList.add('bg-blue-600', 'text-white');
                renderMatrix(container);
            } else if (view === 'qr-launcher') {
                title.innerText = "QR Activation Center";
                renderQRLauncher(container);
            } else if (view === 'live-qr') {
                title.innerText = "Active QR Session";
                renderLiveQR(container);
            }
            
            lucide.createIcons();
        }

        function refreshView() {
            switchView(activeView);
        }

        // --- DASHBOARD ---
        function renderDashboard(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.course === filter);
            
            const totalSessPossible = list.length * 22;
            const actualPresent = list.reduce((acc, s) => acc + s.sessions.filter(v => v === 1).length, 0);
            const rate = totalSessPossible ? ((actualPresent / totalSessPossible) * 100).toFixed(1) : 0;

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Global Attendance</p>
                        <h3 class="text-4xl font-black text-blue-600">${rate}%</h3>
                        <div class="mt-4 w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600" style="width: ${rate}%"></div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Student Count</p>
                        <h3 class="text-4xl font-black text-slate-900">${list.length}</h3>
                        <p class="text-xs text-slate-400 font-bold mt-2">Active in ${filter}</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Session Target</p>
                        <h3 class="text-4xl font-black text-slate-900">22</h3>
                        <p class="text-xs text-slate-400 font-bold mt-2">Per Semester Module</p>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="px-8 py-6 border-b border-slate-50 flex justify-between items-center">
                        <h4 class="font-bold">Compliance Leaderboard</h4>
                        <span class="text-[10px] font-black px-3 py-1 bg-slate-100 text-slate-500 rounded-lg">LIVE DATA</span>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-[10px] text-slate-400 font-black uppercase border-b border-slate-50">
                            <tr>
                                <th class="px-8 py-4">Identity</th>
                                <th class="px-8 py-4">Matric</th>
                                <th class="px-8 py-4">Course</th>
                                <th class="px-8 py-4">Rate</th>
                                <th class="px-8 py-4 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${list.map(s => {
                                const sRate = ((s.sessions.filter(v=>v===1).length / 22) * 100).toFixed(0);
                                return `
                                    <tr class="hover:bg-slate-50/50 transition-colors">
                                        <td class="px-8 py-4 flex items-center gap-3">
                                            <img src="${s.pic}" class="w-10 h-10 rounded-xl bg-slate-100" onerror="this.src='https://ui-avatars.com/api/?name=${s.firstName}'">
                                            <div class="font-bold text-sm text-slate-800">${s.firstName} ${s.lastName}</div>
                                        </td>
                                        <td class="px-8 py-4 font-mono text-xs text-slate-400">${s.matric}</td>
                                        <td class="px-8 py-4 text-xs font-bold text-slate-500">${s.course}</td>
                                        <td class="px-8 py-4 font-black text-sm ${sRate < 75 ? 'text-red-500' : 'text-blue-600'}">${sRate}%</td>
                                        <td class="px-8 py-4 text-center">
                                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${sRate < 75 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}">
                                                ${sRate < 75 ? 'LOW' : 'EXCELLENT'}
                                            </span>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // --- MATRIX ---
        function renderMatrix(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.course === filter);

            el.innerHTML = `
                <div class="bg-white rounded-[2.5rem] border border-slate-100 p-8 shadow-sm">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h4 class="text-xl font-bold">Comprehensive Session Grid</h4>
                            <p class="text-xs text-slate-400">Tracking 22 individual sessions per module.</p>
                        </div>
                    </div>

                    <div class="space-y-4">
                        ${list.map(s => `
                            <div class="flex items-center gap-6 p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-blue-200 transition-all">
                                <div class="w-40 shrink-0">
                                    <p class="font-bold text-slate-800 text-sm truncate">${s.firstName} ${s.lastName}</p>
                                    <p class="text-[9px] font-black text-slate-400 uppercase">${s.matric}</p>
                                </div>
                                <div class="flex-1 overflow-x-auto no-scrollbar">
                                    <div class="flex gap-1.5">
                                        ${s.sessions.map((v, i) => `
                                            <div class="flex flex-col items-center gap-1 group relative">
                                                <div class="session-dot ${v === 1 ? 'present' : 'absent'} cursor-help"></div>
                                                <span class="text-[7px] font-black text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity">S${i+1}</span>
                                                <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[8px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 pointer-events-none z-10 whitespace-nowrap">
                                                    Session ${i+1}: ${v ? 'Present' : 'Absent'}
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                <div class="w-16 text-right">
                                    <p class="text-xs font-black text-blue-600">${s.sessions.filter(v=>v===1).length}/22</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- REGISTRY ---
        function renderRegistry(el) {
            el.innerHTML = `
                <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                            <tr>
                                <th class="px-8 py-5">Full Name</th>
                                <th class="px-8 py-5">Contact</th>
                                <th class="px-8 py-5">Matric</th>
                                <th class="px-8 py-5">Course</th>
                                <th class="px-8 py-5">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${students.map((s, idx) => `
                                <tr>
                                    <td class="px-8 py-5 flex items-center gap-3">
                                        <img src="${s.pic}" class="w-12 h-12 rounded-2xl object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${s.firstName}'">
                                        <div class="font-bold text-slate-800">${s.firstName} ${s.lastName}</div>
                                    </td>
                                    <td class="px-8 py-5 text-xs text-slate-500 font-medium">
                                        <div>${s.email}</div>
                                        <div class="text-[10px] text-slate-400">${s.phone}</div>
                                    </td>
                                    <td class="px-8 py-5 font-mono text-xs text-slate-400 font-bold">${s.matric}</td>
                                    <td class="px-8 py-5"><span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-[10px] font-black">${s.course}</span></td>
                                    <td class="px-8 py-5">
                                        <button onclick="editStudent(${idx})" class="p-2 text-slate-300 hover:text-blue-600"><i data-lucide="settings-2" class="w-5 h-5"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            lucide.createIcons();
        }

        // --- QR LAUNCHER ---
        function renderQRLauncher(el) {
            el.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-12 rounded-[3rem] border border-slate-100 shadow-xl text-center">
                    <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-inner">
                        <i data-lucide="zap" class="w-10 h-10"></i>
                    </div>
                    <h3 class="text-3xl font-black text-slate-900 mb-2">Activate Attendance</h3>
                    <p class="text-slate-400 mb-10 font-medium">Select a module and session number to generate a secure QR code valid for 15 minutes.</p>

                    <div class="grid grid-cols-2 gap-6 mb-8 text-left">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Module</label>
                            <select id="launch-course" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                                <option value="CSC101">Computer Science (CSC101)</option>
                                <option value="PHY201">Applied Physics (PHY201)</option>
                                <option value="GST111">General Studies (GST111)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Session (1-22)</label>
                            <select id="launch-session" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                                ${Array.from({length: 22}, (_, i) => `<option value="${i+1}">Session ${i+1}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <button onclick="startQRSession()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg hover:bg-blue-600 transition-all shadow-xl shadow-slate-900/10">GENERATE SECURE QR</button>
                </div>
            `;
            lucide.createIcons();
        }

        function startQRSession() {
            const course = document.getElementById('launch-course').value;
            const sessionNum = parseInt(document.getElementById('launch-session').value);
            
            liveSession = {
                course: course,
                sessionIndex: sessionNum - 1, // 0-based
                expiry: Date.now() + (15 * 60 * 1000), // 15 mins
                token: Math.random().toString(36).substring(7).toUpperCase()
            };

            switchView('live-qr');
        }

        function renderLiveQR(el) {
            el.innerHTML = `
                <div class="max-w-xl mx-auto text-center">
                    <div class="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-100 relative overflow-hidden mb-10">
                        <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                        <div class="flex justify-between items-start mb-10">
                            <div class="text-left">
                                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">${liveSession.course}</p>
                                <h3 class="text-2xl font-black text-slate-900">Session ${liveSession.sessionIndex + 1}</h3>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1 timer-animate">Time Remaining</p>
                                <h3 id="timer-display" class="text-2xl font-black text-slate-900 font-mono">15:00</h3>
                            </div>
                        </div>

                        <div id="qrcode" class="mb-10 p-4 inline-block bg-slate-50 rounded-[2.5rem] border-4 border-slate-50"></div>

                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 flex items-center justify-between">
                            <div class="text-left">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Verified Check-ins</p>
                                <p id="checkin-count" class="text-3xl font-black text-slate-900">0</p>
                            </div>
                            <button onclick="simulateStudentScan()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm hover:bg-blue-500 transition-all">Manual Check-in</button>
                        </div>
                    </div>
                    
                    <button onclick="endLiveSession()" class="text-slate-400 hover:text-red-500 font-black text-sm transition-all flex items-center gap-2 mx-auto">
                        <i data-lucide="power" class="w-4 h-4"></i> DISMISS SESSION
                    </button>
                </div>
            `;

            // Initialize QR
            setTimeout(() => {
                const qrContainer = document.getElementById("qrcode");
                new QRCode(qrContainer, {
                    text: `ATTENDX-${liveSession.course}-${liveSession.token}`,
                    width: 250,
                    height: 250,
                    colorDark: "#020617",
                    colorLight: "#f8fafc"
                });
                startTimer();
                lucide.createIcons();
            }, 100);
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = Date.now();
                const diff = liveSession.expiry - now;

                if (diff <= 0) {
                    clearInterval(timerInterval);
                    showModal(`
                        <div class="text-center py-10">
                            <div class="w-20 h-20 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="clock" class="w-10 h-10"></i>
                            </div>
                            <h3 class="text-2xl font-black text-slate-900 mb-2">Session Expired</h3>
                            <p class="text-slate-400 mb-8 font-medium">The 15-minute window for this QR code has closed.</p>
                            <button onclick="closeModal(); switchView('dashboard');" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">Return to Dashboard</button>
                        </div>
                    `);
                    return;
                }

                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function simulateStudentScan() {
            const eligible = students.filter(s => s.course === liveSession.course);
            if (!eligible.length) return showToast("No students registered for this course.");
            
            // Pick a random student who hasn't checked in for THIS session
            const candidates = eligible.filter(s => s.sessions[liveSession.sessionIndex] === 0);
            if (!candidates.length) return showToast("All eligible students are present.");

            const lucky = candidates[Math.floor(Math.random() * candidates.length)];
            lucky.sessions[liveSession.sessionIndex] = 1;
            
            const countEl = document.getElementById('checkin-count');
            countEl.innerText = eligible.filter(s => s.sessions[liveSession.sessionIndex] === 1).length;
            
            showToast(`Verified: ${lucky.firstName} ${lucky.lastName}`);
        }

        function endLiveSession() {
            clearInterval(timerInterval);
            liveSession = null;
            switchView('dashboard');
        }

        // --- CSV TOOLS ---
        function downloadCSVTemplate() {
            const headers = "Pic_URL,FirstName,LastName,MatricNumber,Email,PhoneNumber,CourseCode\n";
            const sample = "https://i.pravatar.cc/150,Faith,Doe,24/CSC/100,faith@edu.com,080000,CSC101\n";
            const blob = new Blob([headers + sample], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'AttendX_Template.csv';
            a.click();
            showToast("Template downloaded.");
        }

        function handleCSVImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const rows = e.target.result.split('\n').slice(1);
                let count = 0;
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 6 && cols[1]) {
                        students.push({
                            pic: cols[0].trim() || `https://ui-avatars.com/api/?name=${cols[1]}`,
                            firstName: cols[1].trim(),
                            lastName: cols[2].trim(),
                            matric: cols[3].trim(),
                            email: cols[4].trim(),
                            phone: cols[5].trim(),
                            course: cols[6]?.trim() || 'GENERAL',
                            sessions: Array(22).fill(0)
                        });
                        count++;
                    }
                });
                showToast(`Imported ${count} student(s)`);
                switchView('students');
            };
            reader.readAsText(file);
        }

        // --- UTILS ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            t.classList.remove('translate-y-32');
            t.classList.add('translate-y-0');
            setTimeout(() => {
                t.classList.remove('translate-y-0');
                t.classList.add('translate-y-32');
            }, 3000);
        }

        function showModal(content) {
            const b = document.getElementById('modal-backdrop');
            const m = document.getElementById('modal-body');
            m.innerHTML = content;
            b.classList.remove('hidden');
            setTimeout(() => {
                m.classList.remove('scale-95', 'opacity-0');
                lucide.createIcons();
            }, 10);
        }

        function closeModal() {
            const m = document.getElementById('modal-body');
            m.classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('modal-backdrop').classList.add('hidden'), 200);
        }

        window.onload = () => switchView('dashboard');
    </script>
</body>
</html>
