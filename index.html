<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Advanced Admin & Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .session-dot { width: 10px; height: 10px; border-radius: 2px; }
        .present { background-color: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .absent { background-color: #e2e8f0; }
        
        #qrcode img { margin: 0 auto; border: 12px solid white; border-radius: 24px; }
        .timer-animate { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-slate-950 text-white p-6 fixed h-full flex flex-col z-30 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/40"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
                <h1 class="font-black text-xl tracking-tighter">ATTENDX</h1>
            </div>
            
            <nav class="space-y-1 flex-1">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Dashboard</span>
                </button>
                <button onclick="switchView('students')" id="btn-students" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Registry</span>
                </button>
                <button onclick="switchView('courses')" id="btn-courses" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Manage Courses</span>
                </button>
                <button onclick="switchView('matrix')" id="btn-matrix" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Session Matrix</span>
                </button>
            </nav>

            <div class="mt-auto space-y-4">
                <button onclick="switchView('qr-launcher')" id="btn-qr" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-sm font-black shadow-xl shadow-blue-900/40 transition-all active:scale-95">
                    <i data-lucide="qr-code" class="w-5 h-5"></i> ACTIVATE QR
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="ml-64 flex-1 p-10 transition-all duration-300">
            <header id="main-header" class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-black text-slate-900 tracking-tight">Dashboard</h2>
                    <p id="page-subtitle" class="text-slate-400 text-sm font-medium">Monitoring academic compliance.</p>
                </div>
                <div class="flex items-center gap-3" id="header-actions">
                    <select id="global-course-filter" onchange="refreshView()" class="bg-white border-2 border-slate-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-blue-600 transition-all cursor-pointer">
                        <option value="ALL">All Courses</option>
                    </select>
                </div>
            </header>

            <div id="view-container" class="fade-in"></div>
        </main>
    </div>

    <!-- Student Scanning View Overlay (Simulated App) -->
    <div id="student-view" class="fixed inset-0 bg-slate-50 z-[100] hidden flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-md bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="user-check" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">Student Check-in</h2>
            <p id="student-view-info" class="text-slate-500 text-sm mb-8">Please select your name to verify attendance.</p>
            
            <div class="space-y-6 text-left">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Select Your Name</label>
                    <select id="student-select" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600 appearance-none">
                        <option value="">Choose from list...</option>
                    </select>
                </div>
                <button onclick="submitStudentAttendance()" class="w-full bg-slate-950 text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition-all">
                    CONFIRM ATTENDANCE
                </button>
                <button onclick="closeStudentView()" class="w-full text-slate-400 font-bold text-sm mt-4">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-[1.5rem] shadow-2xl flex items-center gap-4 transform translate-y-32 transition-transform duration-500 z-50 border border-slate-800">
        <div class="bg-blue-500 p-1.5 rounded-lg"><i data-lucide="bell" class="w-4 h-4"></i></div>
        <span id="toast-text" class="text-sm font-bold">Action successful</span>
    </div>

    <script>
        // --- DATA STATE ---
        let courses = [
            { id: 'c1', code: 'CSC101', name: 'Intro to Programming' },
            { id: 'c2', code: 'PHY201', name: 'General Physics II' }
        ];

        let students = [
            { id: 's1', matric: '24/CSC/001', firstName: 'Faith', lastName: 'Okon', courseCode: 'CSC101', sessions: Array(22).fill(0), pic: 'https://i.pravatar.cc/150?u=1' },
            { id: 's2', matric: '24/CSC/002', firstName: 'John', lastName: 'Smith', courseCode: 'CSC101', sessions: Array(22).fill(0), pic: 'https://i.pravatar.cc/150?u=2' },
            { id: 's3', matric: '24/PHY/005', firstName: 'Amara', lastName: 'Cole', courseCode: 'PHY201', sessions: Array(22).fill(0), pic: 'https://i.pravatar.cc/150?u=3' }
        ];

        let activeView = 'dashboard';
        let liveSession = null;
        let timerInterval = null;

        // --- CORE NAVIGATION ---
        function switchView(view) {
            activeView = view;
            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('bg-blue-600', 'text-white'));
            updateGlobalFilterOptions();
            
            if (view === 'dashboard') {
                title.innerText = "Dashboard Overview";
                subtitle.innerText = "General statistics and student compliance.";
                document.getElementById('btn-dashboard').classList.add('bg-blue-600', 'text-white');
                renderDashboard(container);
            } else if (view === 'students') {
                title.innerText = "Student Registry";
                subtitle.innerText = "Manage student information and enrollments.";
                document.getElementById('btn-students').classList.add('bg-blue-600', 'text-white');
                renderRegistry(container);
            } else if (view === 'courses') {
                title.innerText = "Course Management";
                subtitle.innerText = "Add, edit, or remove academic modules.";
                document.getElementById('btn-courses').classList.add('bg-blue-600', 'text-white');
                renderCourses(container);
            } else if (view === 'matrix') {
                title.innerText = "Attendance Matrix";
                subtitle.innerText = "Visual grid of all 22 sessions.";
                document.getElementById('btn-matrix').classList.add('bg-blue-600', 'text-white');
                renderMatrix(container);
            } else if (view === 'qr-launcher') {
                title.innerText = "QR Activation Center";
                renderQRLauncher(container);
            } else if (view === 'live-qr') {
                title.innerText = "Active QR Session";
                renderLiveQR(container);
            }
            lucide.createIcons();
        }

        function refreshView() { switchView(activeView); }

        function updateGlobalFilterOptions() {
            const select = document.getElementById('global-course-filter');
            const currentVal = select.value;
            select.innerHTML = '<option value="ALL">All Courses</option>';
            courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.code;
                opt.innerText = `${c.code} - ${c.name}`;
                select.appendChild(opt);
            });
            select.value = courses.some(c => c.code === currentVal) ? currentVal : 'ALL';
        }

        // --- DASHBOARD ---
        function renderDashboard(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.courseCode === filter);
            const totalSessPossible = list.length * 22;
            const actualPresent = list.reduce((acc, s) => acc + s.sessions.filter(v => v === 1).length, 0);
            const rate = totalSessPossible ? ((actualPresent / totalSessPossible) * 100).toFixed(1) : 0;

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Attendance Rate</p>
                        <h3 class="text-4xl font-black text-blue-600">${rate}%</h3>
                        <div class="mt-4 w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600" style="width: ${rate}%"></div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Students</p>
                        <h3 class="text-4xl font-black text-slate-900">${list.length}</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Modules</p>
                        <h3 class="text-4xl font-black text-slate-900">${courses.length}</h3>
                    </div>
                </div>
            `;
        }

        // --- COURSES ---
        function renderCourses(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <h4 class="font-black text-lg mb-6">Manage Module</h4>
                        <div class="space-y-4">
                            <input id="new-course-code" placeholder="CSC101" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                            <input id="new-course-name" placeholder="Course Title" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                            <button id="course-action-btn" onclick="addCourse()" class="w-full bg-slate-950 text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition-all">Add Course</button>
                            <button id="course-cancel-btn" onclick="clearCourseForm()" class="w-full text-slate-400 text-xs font-bold hidden">Cancel Edit</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                <tr><th class="px-8 py-5">Code</th><th class="px-8 py-5">Name</th><th class="px-8 py-5 text-right">Actions</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${courses.map(c => `
                                    <tr>
                                        <td class="px-8 py-5 font-black text-blue-600">${c.code}</td>
                                        <td class="px-8 py-5 font-bold text-slate-700">${c.name}</td>
                                        <td class="px-8 py-5 text-right space-x-2">
                                            <button onclick="editCourse('${c.id}')" class="text-slate-300 hover:text-blue-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                            <button onclick="deleteCourse('${c.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        let editingCourseId = null;

        function editCourse(id) {
            const course = courses.find(c => c.id === id);
            editingCourseId = id;
            document.getElementById('new-course-code').value = course.code;
            document.getElementById('new-course-name').value = course.name;
            const btn = document.getElementById('course-action-btn');
            btn.innerText = "Update Course";
            btn.setAttribute('onclick', 'saveCourseEdit()');
            document.getElementById('course-cancel-btn').classList.remove('hidden');
        }

        function clearCourseForm() {
            editingCourseId = null;
            document.getElementById('new-course-code').value = '';
            document.getElementById('new-course-name').value = '';
            const btn = document.getElementById('course-action-btn');
            btn.innerText = "Add Course";
            btn.setAttribute('onclick', 'addCourse()');
            document.getElementById('course-cancel-btn').classList.add('hidden');
        }

        function saveCourseEdit() {
            const code = document.getElementById('new-course-code').value.trim().toUpperCase();
            const name = document.getElementById('new-course-name').value.trim();
            if (!code || !name) return showToast("Fields required");
            
            const idx = courses.findIndex(c => c.id === editingCourseId);
            courses[idx].code = code;
            courses[idx].name = name;
            
            showToast("Course updated");
            clearCourseForm();
            refreshView();
        }

        function addCourse() {
            const code = document.getElementById('new-course-code').value.trim().toUpperCase();
            const name = document.getElementById('new-course-name').value.trim();
            if (!code || !name) return showToast("Fields required");
            courses.push({ id: 'c' + Date.now(), code, name });
            showToast("Course added");
            document.getElementById('new-course-code').value = '';
            document.getElementById('new-course-name').value = '';
            refreshView();
        }

        function deleteCourse(id) {
            courses = courses.filter(c => c.id !== id);
            showToast("Course removed");
            refreshView();
        }

        // --- REGISTRY ---
        function renderRegistry(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.courseCode === filter);
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <!-- Enrollment Sidebar -->
                    <div class="space-y-8">
                        <!-- Single Form -->
                        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                            <h4 class="font-black text-lg mb-6 flex items-center gap-2">
                                <i data-lucide="user-plus" class="w-5 h-5 text-blue-600"></i> Single Entry
                            </h4>
                            <div class="space-y-4">
                                <input id="stu-firstname" placeholder="First Name" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                                <input id="stu-lastname" placeholder="Last Name" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                                <input id="stu-matric" placeholder="Matric No." class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                                <select id="stu-course" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                                    ${courses.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}
                                </select>
                                <button id="stu-action-btn" onclick="addStudent()" class="w-full bg-slate-950 text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition-all">Enroll Student</button>
                                <button id="stu-cancel-btn" onclick="clearStudentForm()" class="w-full text-slate-400 text-xs font-bold hidden text-center mt-2">Cancel Edit</button>
                            </div>
                        </div>

                        <!-- Bulk Enrollment -->
                        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                            <h4 class="font-black text-lg mb-2 flex items-center gap-2">
                                <i data-lucide="layers" class="w-5 h-5 text-purple-600"></i> Bulk Upload
                            </h4>
                            <p class="text-[10px] text-slate-400 mb-4 leading-relaxed uppercase font-black">Paste from Excel or use CSV format:<br>FirstName, LastName, Matric</p>
                            <div class="space-y-4">
                                <textarea id="bulk-input" rows="5" placeholder="Faith Okon 24/CSC/001&#10;John Smith 24/CSC/002" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-mono text-xs font-bold outline-none focus:border-purple-600"></textarea>
                                <select id="bulk-course" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-purple-600">
                                    ${courses.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}
                                </select>
                                <button onclick="processBulkEnrollment()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black hover:bg-purple-700 transition-all">Upload Batch</button>
                            </div>
                        </div>
                    </div>

                    <!-- Student Table -->
                    <div class="lg:col-span-3 bg-white rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden flex flex-col">
                        <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                            <h4 class="font-black text-xl">Enrollment List</h4>
                            <div class="text-slate-400 text-xs font-bold uppercase tracking-wider">${list.length} Records Found</div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                    <tr><th class="px-8 py-5">Student Details</th><th class="px-8 py-5">Matric No.</th><th class="px-8 py-5">Course</th><th class="px-8 py-5 text-right">Actions</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    ${list.map(s => `
                                        <tr class="hover:bg-slate-50/50 transition-colors">
                                            <td class="px-8 py-5 flex items-center gap-4">
                                                <div class="w-10 h-10 rounded-xl bg-slate-100 flex-shrink-0 overflow-hidden border-2 border-white shadow-sm">
                                                    <img src="${s.pic}" class="w-full h-full object-cover">
                                                </div>
                                                <div>
                                                    <p class="font-black text-sm text-slate-800">${s.firstName} ${s.lastName}</p>
                                                    <p class="text-[10px] text-slate-400 uppercase font-bold">Regular Student</p>
                                                </div>
                                            </td>
                                            <td class="px-8 py-5 font-mono text-xs text-slate-500 font-bold">${s.matric}</td>
                                            <td class="px-8 py-5">
                                                <span class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase ring-1 ring-blue-100">${s.courseCode}</span>
                                            </td>
                                            <td class="px-8 py-5 text-right">
                                                <div class="flex justify-end gap-2">
                                                    <button onclick="editStudent('${s.id}')" class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:text-blue-500 hover:bg-blue-50 flex items-center justify-center transition-all"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                                    <button onclick="deleteStudent('${s.id}')" class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center transition-all"><i data-lucide="user-minus" class="w-4 h-4"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                    ${list.length === 0 ? `<tr><td colspan="4" class="px-8 py-20 text-center text-slate-300 font-bold">No students found in this module.</td></tr>` : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function processBulkEnrollment() {
            const rawData = document.getElementById('bulk-input').value.trim();
            const course = document.getElementById('bulk-course').value;
            
            if (!rawData) return showToast("Nothing to upload");
            
            const lines = rawData.split(/\n/);
            let addedCount = 0;
            let errors = 0;

            lines.forEach(line => {
                // Split by comma, tab, or multiple spaces
                const parts = line.split(/[,\t]|\s{2,}/).map(p => p.trim()).filter(p => p);
                
                // Flexible parsing: Try to find at least names and a matric-like string
                if (parts.length >= 2) {
                    let firstName, lastName, matric;
                    
                    if (parts.length >= 3) {
                        firstName = parts[0];
                        lastName = parts[1];
                        matric = parts[2];
                    } else {
                        // Fallback: split names from first part
                        const nameParts = parts[0].split(' ');
                        firstName = nameParts[0];
                        lastName = nameParts.slice(1).join(' ') || 'Student';
                        matric = parts[1];
                    }

                    students.push({
                        id: 's' + Date.now() + Math.random(),
                        matric: matric.toUpperCase(),
                        firstName,
                        lastName,
                        courseCode: course,
                        sessions: Array(22).fill(0),
                        pic: `https://i.pravatar.cc/150?u=${Math.random()}`
                    });
                    addedCount++;
                } else if (line.trim()) {
                    errors++;
                }
            });

            if (addedCount > 0) {
                showToast(`Successfully enrolled ${addedCount} students`);
                document.getElementById('bulk-input').value = '';
                refreshView();
            } else {
                showToast("Failed to parse any data. Check format.");
            }
        }

        let editingStudentId = null;

        function addStudent() {
            const first = document.getElementById('stu-firstname').value.trim();
            const last = document.getElementById('stu-lastname').value.trim();
            const matric = document.getElementById('stu-matric').value.trim();
            const course = document.getElementById('stu-course').value;

            if(!first || !last || !matric) return showToast("All fields required");

            students.push({
                id: 's' + Date.now(),
                matric: matric.toUpperCase(),
                firstName: first,
                lastName: last,
                courseCode: course,
                sessions: Array(22).fill(0),
                pic: `https://i.pravatar.cc/150?u=${Date.now()}`
            });

            showToast("Student enrolled");
            clearStudentForm();
            refreshView();
        }

        function editStudent(id) {
            const s = students.find(x => x.id === id);
            editingStudentId = id;
            document.getElementById('stu-firstname').value = s.firstName;
            document.getElementById('stu-lastname').value = s.lastName;
            document.getElementById('stu-matric').value = s.matric;
            document.getElementById('stu-course').value = s.courseCode;

            const btn = document.getElementById('stu-action-btn');
            btn.innerText = "Update Records";
            btn.classList.remove('bg-slate-950');
            btn.classList.add('bg-blue-600');
            btn.setAttribute('onclick', 'saveStudentEdit()');
            document.getElementById('stu-cancel-btn').classList.remove('hidden');
            
            // Scroll form into view for better UX on mobile
            document.getElementById('stu-firstname').focus();
        }

        function saveStudentEdit() {
            const s = students.find(x => x.id === editingStudentId);
            s.firstName = document.getElementById('stu-firstname').value.trim();
            s.lastName = document.getElementById('stu-lastname').value.trim();
            s.matric = document.getElementById('stu-matric').value.trim().toUpperCase();
            s.courseCode = document.getElementById('stu-course').value;

            showToast("Record updated");
            clearStudentForm();
            refreshView();
        }

        function clearStudentForm() {
            editingStudentId = null;
            document.getElementById('stu-firstname').value = '';
            document.getElementById('stu-lastname').value = '';
            document.getElementById('stu-matric').value = '';
            const btn = document.getElementById('stu-action-btn');
            btn.innerText = "Enroll Student";
            btn.classList.remove('bg-blue-600');
            btn.classList.add('bg-slate-950');
            btn.setAttribute('onclick', 'addStudent()');
            document.getElementById('stu-cancel-btn').classList.add('hidden');
        }

        function deleteStudent(id) {
            students = students.filter(s => s.id !== id);
            showToast("Student removed");
            refreshView();
        }

        // --- MATRIX ---
        function renderMatrix(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.courseCode === filter);
            el.innerHTML = `
                <div class="bg-white rounded-[3rem] border border-slate-100 p-8 shadow-sm">
                    <div class="flex items-center gap-3 mb-8 overflow-x-auto pb-4 no-scrollbar">
                         <div class="flex-shrink-0 bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-black text-slate-400 uppercase">Key:</div>
                         <div class="flex items-center gap-2"><div class="session-dot present"></div><span class="text-xs font-bold text-slate-500">Present</span></div>
                         <div class="flex items-center gap-2"><div class="session-dot absent"></div><span class="text-xs font-bold text-slate-500">Absent</span></div>
                    </div>
                    <div class="space-y-4">
                        ${list.map(s => `
                            <div class="flex items-center gap-6 p-4 bg-slate-50/50 rounded-2xl hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-100">
                                <div class="w-44 shrink-0">
                                    <p class="font-black text-slate-800 text-sm truncate">${s.firstName} ${s.lastName}</p>
                                    <p class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">${s.courseCode} • ${s.matric}</p>
                                </div>
                                <div class="flex-1 flex gap-1.5 overflow-x-auto no-scrollbar py-2">
                                    ${s.sessions.map((v, i) => `
                                        <div class="session-dot ${v === 1 ? 'present' : 'absent'}" title="Session ${i+1}"></div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- QR & STUDENT INTERACTION ---
        function renderQRLauncher(el) {
            el.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-12 rounded-[4rem] border border-slate-100 shadow-xl text-center">
                    <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-blue-100">
                         <i data-lucide="zap" class="w-10 h-10 text-blue-600"></i>
                    </div>
                    <h3 class="text-3xl font-black text-slate-900 mb-2">Activate Attendance</h3>
                    <p class="text-slate-400 mb-10 font-medium">Select a module to generate an active check-in QR code.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-left">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2 block">Module</label>
                            <select id="launch-course" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 font-bold outline-none focus:border-blue-600">
                                ${courses.map(c => `<option value="${c.code}">${c.code} - ${c.name}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2 block">Session</label>
                            <select id="launch-session" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 font-bold outline-none focus:border-blue-600">
                                ${Array.from({length: 22}, (_, i) => `<option value="${i+1}">Session ${i+1}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <button onclick="startQRSession()" class="w-full bg-slate-950 text-white py-6 rounded-[2.5rem] font-black text-lg hover:bg-blue-600 shadow-2xl shadow-blue-500/20 transition-all active:scale-95">INITIATE SESSION</button>
                </div>
            `;
            lucide.createIcons();
        }

        function startQRSession() {
            const course = document.getElementById('launch-course').value;
            const sessionNum = parseInt(document.getElementById('launch-session').value);
            liveSession = {
                course: course,
                sessionIndex: sessionNum - 1,
                expiry: Date.now() + (15 * 60 * 1000)
            };
            switchView('live-qr');
        }

        function renderLiveQR(el) {
            el.innerHTML = `
                <div class="max-w-xl mx-auto text-center">
                    <div class="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-100 relative mb-10">
                        <div class="flex justify-between items-start mb-10">
                            <div class="text-left"><p class="text-[10px] font-black text-blue-600 uppercase tracking-wider">${liveSession.course}</p><h3 class="text-2xl font-black">Attendance Gate</h3></div>
                            <div class="text-right flex items-center gap-3 bg-red-50 px-4 py-2 rounded-2xl border border-red-100">
                                <div class="w-2 h-2 bg-red-500 rounded-full timer-animate"></div>
                                <h3 id="timer-display" class="text-lg font-black font-mono text-red-600">15:00</h3>
                            </div>
                        </div>
                        <div id="qrcode" class="mb-10 p-6 inline-block bg-white border-2 border-slate-50 rounded-[3rem] shadow-inner"></div>
                        
                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 text-sm font-bold text-slate-600 flex items-center gap-4 text-left leading-snug mb-8">
                            <div class="p-3 bg-white rounded-xl shadow-sm"><i data-lucide="smartphone" class="w-5 h-5 text-blue-600"></i></div>
                            <div>
                                <p class="text-slate-900 font-black">Student Access Protocol</p>
                                <p class="text-xs text-slate-400 font-medium uppercase tracking-tight">Scan with any mobile browser camera</p>
                            </div>
                        </div>

                        <button onclick="openStudentView()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black shadow-xl shadow-blue-500/30 hover:scale-[1.02] transition-transform">SIMULATE MOBILE SCAN</button>
                    </div>
                    <button onclick="endLiveSession()" class="text-slate-400 hover:text-red-500 font-black text-sm uppercase tracking-widest flex items-center gap-2 mx-auto justify-center transition-colors">
                        <i data-lucide="power" class="w-4 h-4"></i> DISCONTINUE SESSION
                    </button>
                </div>
            `;
            setTimeout(() => {
                new QRCode(document.getElementById("qrcode"), { text: "student-scan-token", width: 220, height: 220, colorDark: "#020617", colorLight: "#ffffff" });
                startTimer();
                lucide.createIcons();
            }, 100);
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = liveSession.expiry - Date.now();
                if (diff <= 0) { clearInterval(timerInterval); endLiveSession(); return; }
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function endLiveSession() { clearInterval(timerInterval); liveSession = null; switchView('dashboard'); }

        // --- STUDENT VIEW LOGIC ---
        function openStudentView() {
            if (!liveSession) return;
            const modal = document.getElementById('student-view');
            const select = document.getElementById('student-select');
            
            const candidates = students.filter(s => s.courseCode === liveSession.course && s.sessions[liveSession.sessionIndex] === 0);
            
            select.innerHTML = '<option value="">Select your details...</option>';
            candidates.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.innerText = `${s.firstName} ${s.lastName} (${s.matric})`;
                select.appendChild(opt);
            });

            document.getElementById('student-view-info').innerText = `Self Check-in: ${liveSession.course} - Session ${liveSession.sessionIndex + 1}`;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeStudentView() {
            document.getElementById('student-view').classList.add('hidden');
        }

        function submitStudentAttendance() {
            const sid = document.getElementById('student-select').value;
            if (!sid) return showToast("Please select your name");
            
            const student = students.find(s => s.id === sid);
            student.sessions[liveSession.sessionIndex] = 1;
            
            showToast(`Success! Attendance logged for ${student.firstName}.`);
            closeStudentView();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            t.classList.remove('translate-y-32'); t.classList.add('translate-y-0');
            setTimeout(() => { t.classList.remove('translate-y-0'); t.classList.add('translate-y-32'); }, 3000);
        }

        window.onload = () => switchView('dashboard');
    </script>
</body>
</html>
