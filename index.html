<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Attendance Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scan-line { animation: scan-bounce 2s infinite ease-in-out; }
        @keyframes scan-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(240px); } }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white p-6 fixed h-full flex flex-col border-r border-slate-800 z-30">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="user-check" class="w-6 h-6"></i></div>
                <h1 class="font-bold text-xl tracking-tight">AttendX</h1>
            </div>
            
            <nav class="space-y-2 flex-1 overflow-y-auto">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Dashboard</span>
                </button>
                <button onclick="switchView('courses')" id="btn-courses" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Courses</span>
                </button>
                <button onclick="switchView('students')" id="btn-students" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Student Registry</span>
                </button>
                <button onclick="switchView('sessions')" id="btn-sessions" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="history" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Past Sessions</span>
                </button>
                <div class="pt-4 pb-2 px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Integrations</div>
                <button onclick="switchView('zoom')" id="btn-zoom" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="video" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Zoom Reports</span>
                </button>
            </nav>

            <div class="mt-auto pt-4 border-t border-slate-800 space-y-2">
                <button onclick="downloadCSVTemplate()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-[11px] font-bold text-blue-400 border border-slate-700 transition-colors">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i>
                    CSV Template
                </button>
                <button onclick="switchView('scanner')" id="btn-scanner" class="nav-link w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl text-sm font-medium transition-colors">
                    <i data-lucide="qr-code" class="w-4 h-4"></i>
                    Scanner Terminal
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="ml-64 flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="page-title" class="text-2xl font-bold text-slate-800 tracking-tight">Dashboard</h2>
                    <p id="page-subtitle" class="text-slate-500 text-sm">Monitoring system metrics.</p>
                </div>
                <div id="header-actions" class="flex gap-3">
                    <button onclick="document.getElementById('csv-upload').click()" class="flex items-center gap-2 bg-slate-900 px-4 py-2 text-white rounded-lg text-sm font-bold hover:bg-slate-800 transition-all">
                        <i data-lucide="upload" class="w-4 h-4"></i>
                        Batch Import
                    </button>
                    <input type="file" id="csv-upload" class="hidden" accept=".csv" onchange="handleStudentCSVImport(event)">
                    <button onclick="openCreateCourseModal()" class="flex items-center gap-2 bg-blue-600 px-4 py-2 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-lg transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        Add Course
                    </button>
                </div>
            </div>

            <div id="view-container" class="fade-in"></div>
        </main>
    </div>

    <!-- Universal Modal -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 transform transition-all scale-95 opacity-0" id="modal-body"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-24 transition-transform duration-300 z-50 border border-slate-700">
        <i data-lucide="check-circle" id="toast-icon" class="text-green-400 w-5 h-5"></i>
        <span id="toast-text" class="text-sm font-medium">Action successful!</span>
    </div>

    <script>
        // --- DATA STORE ---
        const totalSessionsPerCourse = 20;

        let students = [
            { 
                matric: '2024-001', 
                firstName: 'Alice', 
                lastName: 'Smith', 
                email: 'alice@uni.edu', 
                phone: '+123456789',
                picture: 'https://i.pravatar.cc/150?u=alice',
                rate: 92, 
                course: 'CS101' 
            },
            { 
                matric: '2024-002', 
                firstName: 'Bob', 
                lastName: 'Johnson', 
                email: 'bob@uni.edu', 
                phone: '+123456780',
                picture: 'https://i.pravatar.cc/150?u=bob',
                rate: 71, 
                course: 'CS101' 
            },
            { 
                matric: '2024-003', 
                firstName: 'Charlie', 
                lastName: 'Brown', 
                email: 'charlie@uni.edu', 
                phone: '+123456781',
                picture: 'https://i.pravatar.cc/150?u=charlie',
                rate: 58, 
                course: 'PHY201' 
            }
        ];

        let courses = [
            { code: 'CS101', name: 'Intro to Computer Science', instructor: 'Dr. Alan Turing' },
            { code: 'PHY201', name: 'Applied Physics', instructor: 'Dr. Marie Curie' }
        ];

        let logs = [];
        let activeSession = null;

        // --- NAVIGATION ---
        function switchView(view) {
            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('bg-blue-600', 'text-white', 'bg-slate-800'));
            
            if (view === 'dashboard') {
                title.innerText = "Admin Dashboard";
                subtitle.innerText = "General Report and Compliance Monitoring.";
                document.getElementById('btn-dashboard').classList.add('bg-blue-600', 'text-white');
                renderDashboard(container);
            } else if (view === 'courses') {
                title.innerText = "Course Catalog";
                subtitle.innerText = "Manage your teaching modules.";
                document.getElementById('btn-courses').classList.add('bg-blue-600', 'text-white');
                renderCourses(container);
            } else if (view === 'students') {
                title.innerText = "Student Registry";
                subtitle.innerText = "Manage student records and performance.";
                document.getElementById('btn-students').classList.add('bg-blue-600', 'text-white');
                renderStudents(container);
            } else if (view === 'sessions') {
                title.innerText = "Attendance History";
                subtitle.innerText = "Complete log of all verified check-ins.";
                document.getElementById('btn-sessions').classList.add('bg-blue-600', 'text-white');
                renderHistory(container);
            } else if (view === 'zoom') {
                title.innerText = "Zoom Integration";
                subtitle.innerText = "Import meeting reports for online classes.";
                document.getElementById('btn-zoom').classList.add('bg-blue-600', 'text-white');
                renderZoom(container);
            } else if (view === 'scanner') {
                title.innerText = "Terminal Mode";
                document.getElementById('btn-scanner').classList.add('bg-blue-600', 'text-white');
                renderScanner(container);
            } else if (view === 'active-session') {
                title.innerText = "Live Session QR";
                renderActiveQR(container);
            }
            
            lucide.createIcons();
        }

        // --- RENDERERS ---
        function renderDashboard(el) {
            const avgAttendance = students.length ? (students.reduce((acc, s) => acc + s.rate, 0) / students.length).toFixed(1) : 0;
            
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 font-medium">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider mb-1">Avg Attendance</p>
                        <h3 class="text-3xl font-bold text-blue-600">${avgAttendance}%</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider mb-1">Registry Size</p>
                        <h3 class="text-3xl font-bold">${students.length}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider mb-1">Amber Alert (60%)</p>
                        <h3 class="text-3xl font-bold text-amber-500">${students.filter(s => s.rate < 60).length}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider mb-1">Red Alert (75%)</p>
                        <h3 class="text-3xl font-bold text-red-500">${students.filter(s => s.rate < 75).length}</h3>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden mb-8">
                    <div class="p-6 border-b flex justify-between items-center">
                        <h4 class="font-bold text-slate-800">Attendance & Compliance Report</h4>
                        <button onclick="downloadCSVTemplate()" class="text-xs text-blue-600 font-bold flex items-center gap-1 hover:underline">
                             <i data-lucide="download" class="w-3 h-3"></i> Download Excel Template
                        </button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] text-slate-400 uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Student</th>
                                <th class="px-6 py-4">Matric No.</th>
                                <th class="px-6 py-4">Attendance</th>
                                <th class="px-6 py-4">Missed</th>
                                <th class="px-6 py-4 text-center">Status Remark</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y text-sm">
                            ${students.map(s => {
                                const missed = Math.round(totalSessionsPerCourse * (1 - (s.rate / 100)));
                                let remarkClass = "bg-green-100 text-green-700";
                                let remarkText = "Good Standing";
                                
                                if (s.rate < 60) {
                                    remarkClass = "bg-amber-100 text-amber-700 border border-amber-200";
                                    remarkText = "Need for make-up attendance";
                                } else if (s.rate < 75) {
                                    remarkClass = "bg-red-100 text-red-700 border border-red-200";
                                    remarkText = "Downgrade";
                                }

                                return `
                                    <tr class="hover:bg-slate-50 transition-colors">
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-3">
                                                <img src="${s.picture}" class="w-8 h-8 rounded-full bg-slate-200 border border-slate-200" onerror="this.src='https://ui-avatars.com/api/?name=${s.firstName}+${s.lastName}'">
                                                <div>
                                                    <div class="font-bold text-slate-800">${s.firstName} ${s.lastName}</div>
                                                    <div class="text-[10px] text-slate-400 font-medium">${s.email}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4 text-slate-600 font-mono text-xs">${s.matric}</td>
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-3">
                                                <div class="w-20 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                    <div class="h-full ${s.rate < 60 ? 'bg-amber-500' : s.rate < 75 ? 'bg-red-500' : 'bg-blue-600'}" style="width: ${s.rate}%"></div>
                                                </div>
                                                <span class="font-bold text-xs">${s.rate}%</span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4 font-bold text-slate-500 text-xs">${missed} / ${totalSessionsPerCourse}</td>
                                        <td class="px-6 py-4">
                                            <div class="flex justify-center">
                                                <span class="px-3 py-1.5 rounded-full text-[9px] font-bold uppercase ${remarkClass}">
                                                    ${remarkText}
                                                </span>
                                            </div>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderStudents(el) {
            el.innerHTML = `
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] text-slate-400 uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Student</th>
                                <th class="px-6 py-4">Phone / Email</th>
                                <th class="px-6 py-4">Matric No.</th>
                                <th class="px-6 py-4">Course</th>
                                <th class="px-6 py-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y text-sm">
                            ${students.map((s, index) => `
                                <tr>
                                    <td class="px-6 py-4 flex items-center gap-3">
                                        <img src="${s.picture}" class="w-10 h-10 rounded-xl bg-slate-100" onerror="this.src='https://ui-avatars.com/api/?name=${s.firstName}+${s.lastName}'">
                                        <div class="font-bold text-slate-800">${s.firstName} ${s.lastName}</div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <span class="font-medium text-slate-600 text-xs">${s.phone}</span><br>
                                        <span class="text-[10px] text-slate-400 font-medium">${s.email}</span>
                                    </td>
                                    <td class="px-6 py-4 font-mono text-xs text-slate-500">${s.matric}</td>
                                    <td class="px-6 py-4 font-bold text-slate-500 text-xs uppercase tracking-tighter">${s.course}</td>
                                    <td class="px-6 py-4">
                                        <button onclick="editStudent(${index})" class="p-2 bg-slate-50 text-slate-400 hover:text-blue-600 rounded-lg"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // --- CSV HANDLING ---
        function downloadCSVTemplate() {
            const headers = "Picture_URL,FirstName,LastName,MatricNumber,Email,PhoneNumber,CourseCode\n";
            const example = "https://i.pravatar.cc/150,John,Doe,2024-ABC-001,john@edu.com,+234123456,CS101\n";
            const blob = new Blob([headers + example], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'AttendX_Student_Template.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast("Template downloaded!");
        }

        function handleStudentCSVImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n').slice(1); // Skip headers
                let count = 0;

                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 6 && cols[1].trim()) {
                        students.push({
                            picture: cols[0].trim() || `https://ui-avatars.com/api/?name=${cols[1]}+${cols[2]}`,
                            firstName: cols[1].trim(),
                            lastName: cols[2].trim(),
                            matric: cols[3].trim(),
                            email: cols[4].trim(),
                            phone: cols[5].trim(),
                            course: cols[6]?.trim() || 'CS101',
                            rate: 100 // Default 100% for new imports
                        });
                        count++;
                    }
                });

                showToast(`Successfully imported ${count} students!`);
                switchView('dashboard');
            };
            reader.readAsText(file);
        }

        // --- REMAINDER OF APP LOGIC ---
        function renderCourses(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${courses.map((c, index) => `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
                                        <i data-lucide="book" class="w-5 h-5"></i>
                                    </div>
                                    <button onclick="editCourse(${index})" class="text-slate-300 hover:text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                </div>
                                <h4 class="font-bold text-slate-800">${c.name}</h4>
                                <p class="text-[10px] text-slate-400 font-bold mb-2 uppercase">${c.code}</p>
                                <p class="text-xs text-slate-500 mb-4">${c.instructor}</p>
                            </div>
                            <button onclick="quickStart('${c.code}')" class="w-full bg-slate-50 hover:bg-blue-600 hover:text-white py-2 rounded-lg text-xs font-bold transition-all">Start Session</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderHistory(el) {
            el.innerHTML = `
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] text-slate-400 uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Date & Time</th>
                                <th class="px-6 py-4">Student</th>
                                <th class="px-6 py-4">Course</th>
                                <th class="px-6 py-4">Method</th>
                                <th class="px-6 py-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y text-sm">
                            ${logs.length ? logs.slice().reverse().map((log, index) => `
                                <tr>
                                    <td class="px-6 py-4">
                                        <span class="font-bold text-slate-800">${log.date}</span><br>
                                        <span class="text-[10px] text-slate-400 font-bold uppercase">${log.time}</span>
                                    </td>
                                    <td class="px-6 py-4 font-bold text-slate-600">${log.studentName}</td>
                                    <td class="px-6 py-4 text-slate-500">${log.courseCode}</td>
                                    <td class="px-6 py-4 uppercase text-[10px] font-bold text-slate-400">${log.method}</td>
                                    <td class="px-6 py-4">
                                        <button onclick="editLog(${logs.length - 1 - index})" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="calendar" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            `).join('') : `<tr><td colspan="5" class="px-6 py-20 text-center text-slate-300 font-medium">No records found.</td></tr>`}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderZoom(el) {
            el.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl border shadow-sm">
                    <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-6">
                        <i data-lucide="upload" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2">Import Zoom Attendance</h3>
                    <p class="text-slate-500 text-sm mb-6">Select a course and upload your CSV report to sync meeting attendance records automatically.</p>
                    
                    <div class="space-y-4 mb-8">
                         <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Course Target</label>
                            <select id="zoom-course" class="w-full border rounded-xl px-4 py-3 bg-slate-50 outline-none">
                                ${courses.map(c => `<option value="${c.code}">${c.code} - ${c.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="border-2 border-dashed rounded-2xl p-8 text-center hover:border-indigo-400 transition-colors cursor-pointer" onclick="document.getElementById('zoom-file').click()">
                            <input type="file" id="zoom-file" class="hidden" onchange="handleZoomImport(event)">
                            <i data-lucide="file-text" class="w-10 h-10 text-slate-300 mx-auto mb-2"></i>
                            <p class="text-sm font-bold text-slate-600" id="file-name">Click to browse CSV</p>
                        </div>
                    </div>
                    <button onclick="processZoom()" id="zoom-btn" disabled class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold disabled:opacity-50">Sync Records</button>
                </div>
            `;
        }

        function renderScanner(el) {
            el.innerHTML = `
                <div class="max-w-sm mx-auto bg-slate-900 rounded-[3rem] p-4 border-[8px] border-slate-800 h-[600px] flex flex-col justify-center items-center text-center text-white relative overflow-hidden shadow-2xl">
                    <div class="w-64 h-64 border-2 border-blue-500/30 rounded-3xl relative mb-12 bg-slate-800/20 flex items-center justify-center">
                        <i data-lucide="camera" class="w-12 h-12 text-white/5"></i>
                        <div class="scan-line absolute inset-x-4 h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]"></div>
                    </div>
                    <h4 class="text-xl font-bold mb-2 tracking-tight">Scanner Terminal</h4>
                    <p class="text-slate-500 text-sm mb-12 px-8">Point camera at AttendX session QR to check-in.</p>
                    <button onclick="simulateScan()" class="w-4/5 bg-blue-600 py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">Simulate Scan</button>
                </div>
            `;
        }

        function renderActiveQR(el) {
             el.innerHTML = `
                <div class="max-w-xl mx-auto flex flex-col items-center">
                    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center w-full mb-8">
                        <h3 class="text-2xl font-bold text-slate-800 mb-2">${activeSession.courseCode}</h3>
                        <p class="text-slate-400 font-bold text-[10px] uppercase mb-8">Live Classroom Session</p>
                        <div id="qrcode" class="mb-6 inline-block p-4 bg-slate-50 rounded-3xl relative group"></div>
                        <div class="mb-8">
                            <button onclick="copyShareLink()" class="flex items-center gap-2 mx-auto bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition-all shadow-md">
                                <i data-lucide="share-2" class="w-4 h-4"></i>
                                Copy Share Link
                            </button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 bg-blue-50 rounded-2xl text-left">
                                <p class="text-[10px] font-bold text-blue-400 uppercase">Attendees</p>
                                <p class="text-2xl font-bold text-blue-600" id="live-count">0</p>
                            </div>
                            <div class="p-4 bg-slate-50 rounded-2xl text-left">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Started At</p>
                                <p class="text-lg font-bold text-slate-800">${activeSession.time}</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="endSession()" class="text-slate-400 hover:text-red-500 font-bold text-sm transition-colors">End Session</button>
                </div>
            `;
            setTimeout(() => {
                const qrContainer = document.getElementById("qrcode");
                new QRCode(qrContainer, { text: `https://attendx.edu/checkin?session=${activeSession.token}`, width: 256, height: 256, colorDark: "#0f172a", colorLight: "#f8fafc", correctLevel: QRCode.CorrectLevel.H });
                lucide.createIcons();
            }, 100);
        }

        function copyShareLink() {
            if (!activeSession) return;
            const shareText = `📝 Attendance for ${activeSession.courseCode}\n🔗 Link: https://attendx.edu/checkin?session=${activeSession.token}`;
            const textArea = document.createElement("textarea");
            textArea.value = shareText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("Copied to clipboard!");
        }

        function showModal(content) {
            const backdrop = document.getElementById('modal-backdrop');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold" id="modal-title">Edit Entry</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                ${content}
            `;
            backdrop.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-body').classList.remove('scale-95', 'opacity-0');
                lucide.createIcons();
            }, 10);
        }

        function closeModal() {
            document.getElementById('modal-body').classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('modal-backdrop').classList.add('hidden'), 200);
        }

        function editStudent(index) {
            const s = students[index];
            showModal(`
                <div class="space-y-3">
                    <input type="text" id="edit-f-name" value="${s.firstName}" class="w-full border p-3 rounded-xl bg-slate-50 text-sm font-medium" placeholder="First Name">
                    <input type="text" id="edit-l-name" value="${s.lastName}" class="w-full border p-3 rounded-xl bg-slate-50 text-sm font-medium" placeholder="Last Name">
                    <input type="text" id="edit-matric" value="${s.matric}" class="w-full border p-3 rounded-xl bg-slate-50 text-sm font-medium" placeholder="Matric No.">
                    <input type="email" id="edit-email" value="${s.email}" class="w-full border p-3 rounded-xl bg-slate-50 text-sm font-medium" placeholder="Email">
                    <input type="text" id="edit-phone" value="${s.phone}" class="w-full border p-3 rounded-xl bg-slate-50 text-sm font-medium" placeholder="Phone">
                    <input type="text" id="edit-pic" value="${s.picture}" class="w-full border p-3 rounded-xl bg-slate-50 text-sm font-medium" placeholder="Picture URL">
                    <button onclick="saveStudent(${index})" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4">Update Student</button>
                </div>
            `);
            document.getElementById('modal-title').innerText = "Update Student Info";
        }

        function saveStudent(index) {
            students[index].firstName = document.getElementById('edit-f-name').value;
            students[index].lastName = document.getElementById('edit-l-name').value;
            students[index].matric = document.getElementById('edit-matric').value;
            students[index].email = document.getElementById('edit-email').value;
            students[index].phone = document.getElementById('edit-phone').value;
            students[index].picture = document.getElementById('edit-pic').value;
            closeModal();
            switchView('students');
            showToast("Profile updated.");
        }

        function openCreateCourseModal() {
            showModal(`
                <div class="space-y-4">
                    <input type="text" id="new-c-code" placeholder="CS101" class="w-full border p-3 rounded-xl bg-slate-50 font-bold uppercase">
                    <input type="text" id="new-c-name" placeholder="Course Title" class="w-full border p-3 rounded-xl bg-slate-50 font-medium">
                    <input type="text" id="new-c-instr" placeholder="Instructor Name" class="w-full border p-3 rounded-xl bg-slate-50 font-medium">
                    <button onclick="createNewCourse()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Create Course</button>
                </div>
            `);
            document.getElementById('modal-title').innerText = "Add New Course";
        }

        function createNewCourse() {
            const code = document.getElementById('new-c-code').value;
            const name = document.getElementById('new-c-name').value;
            const instr = document.getElementById('new-c-instr').value;
            if(code && name) {
                courses.push({ code, name, instructor: instr });
                closeModal();
                switchView('courses');
                showToast("Course created.");
            }
        }

        function quickStart(code) {
            const now = new Date();
            activeSession = {
                courseCode: code,
                date: now.toISOString().split('T')[0],
                time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                token: `SESS_${Date.now()}`,
                attendees: 0
            };
            switchView('active-session');
        }

        function endSession() {
            activeSession = null;
            switchView('dashboard');
        }

        function simulateScan() {
            if(!activeSession) return showToast("No active session.");
            const student = students[Math.floor(Math.random() * students.length)];
            const now = new Date();
            logs.push({
                studentName: `${student.firstName} ${student.lastName}`,
                courseCode: activeSession.courseCode,
                date: now.toISOString().split('T')[0],
                time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                method: 'qr'
            });
            activeSession.attendees++;
            const count = document.getElementById('live-count');
            if(count) count.innerText = activeSession.attendees;
            showToast(`${student.firstName} checked in.`);
        }

        function handleZoomImport(event) {
            if(event.target.files.length) {
                document.getElementById('file-name').innerText = event.target.files[0].name;
                document.getElementById('zoom-btn').disabled = false;
            }
        }

        function processZoom() {
            const code = document.getElementById('zoom-course').value;
            const btn = document.getElementById('zoom-btn');
            btn.innerText = "Syncing...";
            setTimeout(() => {
                showToast(`Imported Zoom participants for ${code}.`);
                switchView('sessions');
            }, 1000);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            toast.classList.remove('translate-y-24');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('translate-y-24');
            }, 3000);
        }

        window.onload = () => switchView('dashboard');
    </script>
</body>
</html>
