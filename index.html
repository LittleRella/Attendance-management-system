<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-ring { animation: pulseRing 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite; }
        @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeView, setActiveView] = useState('overview');
            const [isLive, setIsLive] = useState(false);
            
            // Your students and courses state
            const [students] = useState([
                { id: 1, matric: '24/MMBA/001', fname: 'Sarah', lname: 'Ade', cohort: 'MMBA 10' },
                { id: 2, matric: '24/EMBA/012', fname: 'John', lname: 'Doe', cohort: 'EMBA 15' }
            ]);

            return (
                <div className="flex min-h-screen bg-slate-50">
                    <aside className="w-72 bg-slate-900 text-white p-8">
                        <h1 className="font-black text-xl italic mb-10">AttendX</h1>
                        <nav className="space-y-4">
                            <button onClick={() => setActiveView('overview')} className="block text-slate-400 hover:text-white">Overview</button>
                            <button onClick={() => setActiveView('registry')} className="block text-slate-400 hover:text-white">Registry</button>
                            <button onClick={() => setIsLive(true)} className="bg-blue-600 w-full py-3 rounded-xl font-bold">Start Live Session</button>
                        </nav>
                    </aside>
                    <main className="flex-1 p-10">
                        {isLive ? (
                            <div className="text-center p-20 border-4 border-dashed border-slate-200 rounded-3xl">
                                <h2 className="text-3xl font-black">Live Session Active</h2>
                                <button onClick={() => setIsLive(false)} className="mt-6 bg-red-500 text-white px-6 py-2 rounded-lg">End Session</button>
                            </div>
                        ) : (
                            <h2 className="text-4xl font-black">Welcome to {activeView}</h2>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
