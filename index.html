<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Enterprise Academic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item-active { background-color: #2563eb; color: white; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        .card-shadow { box-shadow: 0 4px 25px -5px rgba(0,0,0,0.04); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .channel-btn {
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        .channel-btn:hover {
            transform: translateY(-2px);
            border-color: #2563eb;
            background: #eff6ff;
        }

        .matrix-cell {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-[280px] bg-[#0b0f1a] text-white fixed h-full flex flex-col p-8 z-40">
            <div class="flex items-center gap-3 mb-12">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-500/30">
                    <i data-lucide="activity" class="w-6 h-6"></i>
                </div>
                <h1 class="font-black text-2xl tracking-tighter text-white uppercase">AttendX</h1>
            </div>
            
            <nav class="space-y-1.5 flex-1">
                <button onclick="switchView('overview')" id="nav-overview" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="switchView('courses')" id="nav-courses" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="book-open" class="w-5 h-5"></i> Manage Courses
                </button>
                <button onclick="switchView('registry')" id="nav-registry" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="users" class="w-5 h-5"></i> Student Registry
                </button>
                <button onclick="switchView('matrix')" id="nav-matrix" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-white/5 text-slate-400 font-bold text-sm text-left">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i> Session Matrix
                </button>
            </nav>

            <div class="mt-auto space-y-4">
                <div class="p-4 bg-slate-800/50 rounded-2xl border border-white/5">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Options</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[11px] text-slate-300">Auto-Alerts</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" value="" class="sr-only peer" checked>
                            <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                </div>
                <button onclick="switchView('activate')" id="nav-activate" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-sm tracking-wide shadow-xl shadow-blue-900/40 flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i data-lucide="qr-code" class="w-5 h-5"></i> GENERATE QR
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="ml-[280px] flex-1 p-10">
            <header class="flex justify-between items-start mb-10">
                <div>
                    <h2 id="view-title" class="text-4xl font-black tracking-tighter text-slate-900">Dashboard</h2>
                    <p id="view-desc" class="text-slate-500 font-medium text-sm mt-1">Advanced attendance tracking and analytics.</p>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="flex bg-white border border-slate-200 rounded-2xl p-1 shadow-sm overflow-hidden">
                        <div class="px-5 py-2.5 border-r border-slate-100 flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Academic Year</span>
                            <input type="date" id="global-date-filter" onchange="updateGlobalFilters()" class="bg-transparent text-xs font-black outline-none cursor-pointer text-slate-900" value="2024-01-01">
                        </div>
                        <div class="px-5 py-2.5 flex flex-col">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Term</span>
                            <select id="global-semester-filter" onchange="updateGlobalFilters()" class="bg-transparent text-xs font-black outline-none cursor-pointer text-blue-600">
                                <option value="1">Sem 1</option>
                                <option value="2">Sem 2</option>
                            </select>
                        </div>
                    </div>
                </div>
            </header>

            <div id="view-mount" class="fade-in"></div>
        </main>
    </div>

    <!-- Hidden Input for CSV -->
    <input type="file" id="csv-upload-input" accept=".csv" class="hidden" onchange="handleCSVFile(event)">

    <!-- Action Toast -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-2xl shadow-2xl flex items-center gap-4 transform translate-y-32 transition-transform duration-500 z-50 border border-white/10">
        <i data-lucide="check-circle" class="w-5 h-5 text-blue-400"></i>
        <span id="toast-text" class="text-sm font-bold">Action Completed</span>
    </div>

    <script>
        // --- DATA STATE ---
        const ALL_COHORTS = ["MMBA 10", "MMBA 11", "EMBA 30", "EMBA 31", "MEMBA 13"];
        let courses = [
            { id: 'c1', code: 'BUS701', name: 'Strategic Management', semester: 1, date: '2024-01-15' },
            { id: 'c2', code: 'FIN702', name: 'Corporate Finance', semester: 1, date: '2024-02-10' },
            { id: 'c3', code: 'ECN705', name: 'Managerial Economics', semester: 2, date: '2024-06-05' }
        ];

        let students = [
            { id: 's1', matric: '24/MMBA/001', fname: 'Sarah', lname: 'Ade', email: 'sarah.ade@edu.ng', phone: '+234 802 345 6789', cohort: 'MMBA 10', yield: 88 },
            { id: 's2', matric: '24/EMBA/012', fname: 'John', lname: 'Doe', email: 'j.doe@corp.com', phone: '+234 810 123 4567', cohort: 'EMBA 30', yield: 72 },
            { id: 's3', matric: '24/MEM/045', fname: 'Grace', lname: 'Eze', email: 'grace@edu.ng', phone: '+234 703 987 6543', cohort: 'MEMBA 13', yield: 95 },
            { id: 's4', matric: '24/MMBA/002', fname: 'David', lname: 'Okon', email: 'david@gmail.com', phone: '+234 905 555 1234', cohort: 'MMBA 10', yield: 64 }
        ];

        let activeView = 'overview';
        let currentSemester = "1";

        function updateGlobalFilters() {
            currentSemester = document.getElementById('global-semester-filter').value;
            switchView(activeView);
        }

        function downloadCSVTemplate() {
            const content = "Matric,FirstName,LastName,Email,Phone\n24/MBA/001,John,Smith,john@example.com,+2341234567";
            const blob = new Blob([content], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'attendx_student_template.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function triggerCSVUpload() { document.getElementById('csv-upload-input').click(); }

        function handleCSVFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                let count = 0;
                lines.forEach((line, i) => {
                    const cols = line.split(',');
                    if (cols.length >= 5 && !line.includes('Matric')) {
                        students.push({
                            id: 'csv-'+Date.now()+i,
                            matric: cols[0].trim(), fname: cols[1].trim(),
                            lname: cols[2].trim(), email: cols[3].trim(),
                            phone: cols[4].trim(), cohort: ALL_COHORTS[0], yield: 100
                        });
                        count++;
                    }
                });
                if(count > 0) { showToast(`Enrolled ${count} students successfully`); switchView('registry'); }
            };
            reader.readAsText(file);
        }

        window.switchView = function(view) {
            activeView = view;
            const mount = document.getElementById('view-mount');
            const title = document.getElementById('view-title');
            const desc = document.getElementById('view-desc');
            
            document.querySelectorAll('aside nav button, aside .mt-auto button').forEach(b => b.classList.remove('sidebar-item-active'));
            const activeBtn = document.getElementById(`nav-${view}`);
            if (activeBtn) activeBtn.classList.add('sidebar-item-active');

            mount.innerHTML = "";
            
            if (view === 'overview') {
                title.innerText = "Overview";
                desc.innerText = "Performance across all active cohorts.";
                renderOverview(mount);
            } else if (view === 'courses') {
                title.innerText = "Manage Courses";
                desc.innerText = "Configure curriculum and course schedules.";
                renderCourseManagement(mount);
            } else if (view === 'registry') {
                title.innerText = "Student Registry";
                desc.innerText = "Database of all students across cohorts.";
                renderRegistry(mount);
            } else if (view === 'activate') {
                title.innerText = "Generate QR Code";
                desc.innerText = "Create unique session tokens for student self-registration.";
                renderActivate(mount);
            } else if (view === 'matrix') {
                title.innerText = "Session Matrix";
                desc.innerText = "Session-by-session compliance grid.";
                renderMatrix(mount);
            }
            lucide.createIcons();
        };

        function renderOverview(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${ALL_COHORTS.map((cohort, i) => `
                        <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                            <div class="flex justify-between items-center mb-6">
                                <h5 class="font-black text-slate-900 text-lg">${cohort}</h5>
                                <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded-lg">ACTIVE</span>
                            </div>
                            <div class="h-32 mb-6"><canvas id="chart-${i}"></canvas></div>
                            <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                                <div>
                                    <div class="text-2xl font-black text-slate-900">${Math.floor(Math.random()*15)+80}%</div>
                                    <div class="text-[9px] font-black text-slate-400 uppercase">Avg Attendance</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            ALL_COHORTS.forEach((_, i) => {
                const canvas = document.getElementById(`chart-${i}`);
                if (canvas) {
                    new Chart(canvas, {
                        type: 'bar',
                        data: {
                            labels: ['', '', '', '', '', '', ''],
                            datasets: [{ data: [60, 70, 65, 90, 80, 85, 95], backgroundColor: '#2563eb', borderRadius: 6 }]
                        },
                        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
                    });
                }
            });
        }

        function renderCourseManagement(el) {
            el.innerHTML = `
                <div class="bg-white rounded-[3rem] p-10 card-shadow border border-slate-100">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="text-2xl font-black text-slate-900">Active Courses</h3>
                        <button class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-black">+ Add New Course</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${courses.map(c => `
                            <div class="p-6 border border-slate-100 rounded-3xl hover:bg-slate-50 transition-all flex justify-between items-start">
                                <div>
                                    <div class="text-blue-600 font-black text-xs mb-1">${c.code}</div>
                                    <div class="text-lg font-black text-slate-900 mb-2">${c.name}</div>
                                    <div class="text-slate-400 text-[10px] font-bold">Starts: ${c.date}</div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="showToast('Edit feature coming')" class="p-2 text-slate-400 hover:text-blue-600 bg-white border border-slate-100 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                    <button onclick="showToast('Course deleted')" class="p-2 text-slate-400 hover:text-red-600 bg-white border border-slate-100 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        function renderActivate(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 max-w-6xl mx-auto">
                    <div class="space-y-8 text-center">
                        <div class="bg-slate-900 rounded-[3rem] p-12 text-white shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-10"><i data-lucide="shield-check" class="w-40 h-40"></i></div>
                            <div class="bg-white p-8 rounded-[3rem] inline-block mb-10 relative z-10"><i data-lucide="qr-code" class="w-52 h-52 text-slate-900"></i></div>
                            <h3 class="text-4xl font-black">UNIQUE QR</h3>
                            <p class="text-slate-400 mt-4 text-sm font-medium">Scan to select name and register</p>
                        </div>
                    </div>
                    <div class="bg-white p-10 rounded-[3rem] card-shadow space-y-8">
                        <div><h3 class="text-2xl font-black text-slate-900">Configure Broadcast</h3></div>
                        <div class="space-y-6">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Target Cohort</label>
                                <select id="qr-cohort" class="w-full bg-slate-50 p-4 rounded-2xl font-bold border-none outline-none mt-2">
                                    ${ALL_COHORTS.map(c => `<option>${c}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Course</label>
                                <select class="w-full bg-slate-50 p-4 rounded-2xl font-bold border-none outline-none mt-2">
                                    ${courses.map(c => `<option>${c.code} - ${c.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <button onclick="activateQRWorkflow()" class="w-full bg-blue-600 text-white p-6 rounded-[2rem] font-black shadow-xl hover:bg-blue-500 transition-all uppercase tracking-widest">Activate Session QR</button>
                        <p class="text-[10px] text-slate-400 text-center font-bold">Students will see their names in a dropdown upon scanning.</p>
                    </div>
                </div>`;
        }

        function activateQRWorkflow() {
            const cohort = document.getElementById('qr-cohort').value;
            showToast(`Unique QR Activated for ${cohort}. Students can now select names and register.`);
        }

        function renderRegistry(el) {
            el.innerHTML = `
                <div class="bg-white rounded-[3rem] card-shadow border border-slate-100 overflow-hidden">
                    <div class="p-10 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                        <h3 class="font-black text-2xl text-slate-900">Student Directory</h3>
                        <div class="flex gap-4">
                            <button onclick="downloadCSVTemplate()" class="bg-white border border-slate-200 text-slate-600 px-6 py-4 rounded-2xl text-xs font-black flex items-center gap-2 hover:bg-slate-50">
                                <i data-lucide="download" class="w-4 h-4"></i> TEMPLATE
                            </button>
                            <button onclick="triggerCSVUpload()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl text-xs font-black flex items-center gap-2">
                                <i data-lucide="upload" class="w-4 h-4"></i> BULK ENROLL
                            </button>
                        </div>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <tr>
                                <th class="px-10 py-6">Student Profile</th>
                                <th class="px-10 py-6">Contact Details</th>
                                <th class="px-10 py-6">Cohort</th>
                                <th class="px-10 py-6">Yield</th>
                                <th class="px-10 py-6 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${students.map(s => `
                                <tr class="hover:bg-slate-50/50 transition-colors">
                                    <td class="px-10 py-8">
                                        <div class="font-black text-slate-900">${s.fname} ${s.lname}</div>
                                        <div class="text-[10px] text-slate-400 font-mono">${s.matric}</div>
                                    </td>
                                    <td class="px-10 py-8">
                                        <div class="text-xs font-bold text-slate-600">${s.email}</div>
                                        <div class="text-[10px] text-slate-400">${s.phone}</div>
                                    </td>
                                    <td class="px-10 py-8 text-xs font-black text-blue-600">${s.cohort}</td>
                                    <td class="px-10 py-8">
                                        <div class="flex items-center gap-3">
                                            <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                <div class="h-full ${s.yield < 75 ? 'bg-red-500' : 'bg-green-500'}" style="width: ${s.yield}%"></div>
                                            </div>
                                            <span class="text-xs font-black">${s.yield}%</span>
                                        </div>
                                    </td>
                                    <td class="px-10 py-8 text-right">
                                        <button onclick="showToast('Opening student profile')" class="p-3 text-slate-400 hover:text-blue-600"><i data-lucide="external-link" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function renderMatrix(el) {
            const sessions = Array.from({length: 12}, (_, i) => `S${i+1}`);
            el.innerHTML = `
                <div class="bg-white rounded-[3rem] card-shadow border border-slate-100 overflow-x-auto">
                    <div class="p-10 border-b border-slate-50 bg-slate-50/30 flex justify-between items-center sticky left-0">
                        <h3 class="font-black text-2xl text-slate-900">Session Attendance Grid</h3>
                        <div class="flex gap-4">
                            <div class="flex items-center gap-2 text-[10px] font-black text-slate-400">
                                <div class="w-3 h-3 bg-green-500 rounded"></div> PRESENT
                                <div class="w-3 h-3 bg-red-100 rounded"></div> ABSENT
                            </div>
                        </div>
                    </div>
                    <table class="w-full text-left min-w-[1000px]">
                        <thead>
                            <tr class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest">
                                <th class="px-10 py-6 sticky left-0 bg-slate-50 z-10 w-[200px]">Student (Cohort)</th>
                                ${sessions.map(s => `<th class="px-2 py-6 text-center">${s}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${students.map(s => `
                                <tr>
                                    <td class="px-10 py-6 sticky left-0 bg-white z-10">
                                        <div class="font-bold text-slate-900 text-xs">${s.fname} ${s.lname}</div>
                                        <div class="text-[9px] text-slate-400">${s.cohort}</div>
                                    </td>
                                    ${sessions.map(() => {
                                        const present = Math.random() > 0.2;
                                        return `<td class="px-2 py-6"><div class="matrix-cell mx-auto ${present ? 'bg-green-500 shadow-lg shadow-green-500/20' : 'bg-red-50'}"></div></td>`;
                                    }).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            const txt = document.getElementById('toast-text');
            if (t && txt) {
                txt.innerText = m;
                t.classList.remove('translate-y-32');
                setTimeout(() => t.classList.add('translate-y-32'), 3000);
            }
        }

        window.onload = () => switchView('overview');
    </script>
</body>
</html>
