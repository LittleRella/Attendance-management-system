<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Management Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9;
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICON COMPONENT ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeView, setActiveView] = useState('overview');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [toast, setToast] = useState({ visible: false, message: '' });
            const fileInputRef = useRef(null);
            
            // --- STATE MANAGEMENT ---
            const [students, setStudents] = useState([
                { id: 's1', matric: '24/MMBA/001', fname: 'Sarah', lname: 'Ade', email: 'sarah.ade@edu.ng', phone: '+234 802 345 6789', cohort: 'MMBA 10', yield: 88, status: 'Active' },
                { id: 's2', matric: '24/EMBA/012', fname: 'John', lname: 'Doe', email: 'j.doe@corp.com', phone: '+234 810 123 4567', cohort: 'EMBA 15', yield: 72, status: 'Active' },
                { id: 's3', matric: '24/MEM/045', fname: 'Grace', lname: 'Eze', email: 'grace@edu.ng', phone: '+234 703 987 6543', cohort: 'MEMBA 13', yield: 95, status: 'Active' },
                { id: 's4', matric: '24/MMBA/002', fname: 'David', lname: 'Okon', email: 'david@gmail.com', phone: '+234 905 555 1234', cohort: 'MMBA 6', yield: 64, status: 'Warning' }
            ]);

            const [courses, setCourses] = useState([
                { id: 'c1', code: 'BUS701', name: 'Strategic Management', track: 'MMBA', units: 3 },
                { id: 'c2', code: 'FIN702', name: 'Corporate Finance', track: 'EMBA', units: 4 },
                { id: 'c3', code: 'MKT703', name: 'Digital Marketing', track: 'MMBA', units: 2 },
                { id: 'c4', code: 'OPS704', name: 'Operations Logic', track: 'MEMBA', units: 3 }
            ]);

            const [newCourse, setNewCourse] = useState({ code: '', name: '', track: 'MMBA', units: 3 });
            const [showAddCourse, setShowAddCourse] = useState(false);

            // Generates Cohorts 6-20 for a given track
            const getCohortsForTrack = (track) => {
                const arr = [];
                for (let i = 6; i <= 20; i++) arr.push(`${track} ${i}`);
                return arr;
            };

            const ALL_COHORTS = useMemo(() => [
                ...getCohortsForTrack("MMBA"),
                ...getCohortsForTrack("EMBA"),
                ...getCohortsForTrack("MEMBA")
            ], []);

            const showToast = (msg) => {
                setToast({ visible: true, message: msg });
                setTimeout(() => setToast({ visible: false, message: '' }), 3000);
            };

            // --- COURSE ACTIONS ---
            const addCourse = (e) => {
                e.preventDefault();
                if (!newCourse.code || !newCourse.name) return;
                const id = `c-${Date.now()}`;
                setCourses([...courses, { ...newCourse, id }]);
                setNewCourse({ code: '', name: '', track: 'MMBA', units: 3 });
                setShowAddCourse(false);
                showToast("Course added to catalog");
            };

            const deleteCourse = (id) => {
                setCourses(courses.filter(c => c.id !== id));
                showToast("Course removed");
            };

            // --- CSV LOGIC ---
            const downloadTemplate = () => {
                const headers = "FirstName,LastName,MatricNumber,Email,Phone,Cohort\n";
                const sample = "Jane,Smith,24/MMBA/099,jane.smith@example.com,+2348000000000,MMBA 10";
                const blob = new Blob([headers + sample], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('hidden', '');
                a.setAttribute('href', url);
                a.setAttribute('download', 'AttendX_Participant_Template.csv');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast("Template downloaded");
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const lines = event.target.result.split('\n');
                    const newStudents = [];
                    for (let i = 1; i < lines.length; i++) {
                        const row = lines[i].split(',');
                        if (row.length >= 6) {
                            newStudents.push({
                                id: `csv-${Date.now()}-${i}`,
                                fname: row[0].trim(), lname: row[1].trim(), matric: row[2].trim(),
                                email: row[3].trim(), phone: row[4].trim(), cohort: row[5].trim(),
                                yield: 0, status: 'Active'
                            });
                        }
                    }
                    if (newStudents.length > 0) {
                        setStudents(prev => [...prev, ...newStudents]);
                        showToast(`Imported ${newStudents.length} participants`);
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            if (selectedStudent) {
                return <StudentProfilePage student={selectedStudent} onBack={() => setSelectedStudent(null)} />;
            }

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-[260px] bg-[#0f172a] text-white fixed h-full flex flex-col z-40">
                        <div className="p-8 flex items-center gap-3">
                            <div className="bg-blue-500 p-2 rounded-lg shadow-lg">
                                <Icon name="activity" className="w-5 h-5 text-white" />
                            </div>
                            <span className="font-black text-xl tracking-tighter uppercase italic">AttendX</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-1">
                            {[{ id: 'overview', icon: 'grid-3x3', label: 'Dashboard' },
                              { id: 'registry', icon: 'users', label: 'Participants' },
                              { id: 'courses', icon: 'book-open', label: 'Modules' }].map(item => (
                                <button key={item.id} onClick={() => setActiveView(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-bold text-sm ${activeView === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                    <Icon name={item.icon} /> {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6 space-y-3">
                            <button onClick={downloadTemplate} className="w-full bg-slate-800/50 hover:bg-slate-800 text-slate-400 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 border border-slate-700/50 transition-all">
                                <Icon name="download" className="w-3 h-3" /> Get Template
                            </button>
                            <button onClick={() => setActiveView('activate')} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-xl font-black text-xs tracking-widest flex items-center justify-center gap-2 border border-slate-700">
                                <Icon name="qr-code" className="w-4 h-4 text-blue-400" /> LIVE SESSION
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="ml-[260px] flex-1 p-8 animate-in">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-3xl font-black tracking-tight text-slate-900 capitalize">
                                    {activeView === 'overview' ? 'Executive Overview' : activeView}
                                </h2>
                                <p className="text-slate-500 font-medium text-sm">AttendX Platform Management</p>
                            </div>
                        </header>

                        {/* Overview View */}
                        {activeView === 'overview' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    <StatCard icon="users" label="Total Participants" value={students.length} trend="+12%" color="bg-blue-500" />
                                    <StatCard icon="book-open" label="Active Courses" value={courses.length} trend="+2" color="bg-orange-500" />
                                    <StatCard icon="award" label="Total Credit Units" value={courses.reduce((acc, c) => acc + Number(c.units), 0)} trend="Global" color="bg-purple-500" />
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm h-64 flex flex-col items-center justify-center text-center">
                                    <Icon name="bar-chart-3" className="w-12 h-12 text-slate-200 mb-4" />
                                    <p className="text-slate-300 font-black italic uppercase tracking-widest">Analytics Dashboard Active</p>
                                </div>
                            </div>
                        )}

                        {/* Registry View */}
                        {activeView === 'registry' && (
                            <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                                <div className="p-8 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="font-black text-xl">Participant Directory</h3>
                                    <div className="flex gap-3">
                                        <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".csv" className="hidden" />
                                        <button onClick={() => fileInputRef.current.click()} className="px-6 py-2.5 bg-blue-600 text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg shadow-blue-500/20 flex items-center gap-2">
                                            <Icon name="upload" className="w-4 h-4" /> Import CSV
                                        </button>
                                    </div>
                                </div>
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                        <tr>
                                            <th className="px-8 py-5">Full Name</th>
                                            <th className="px-8 py-5 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {students.map(s => (
                                            <tr key={s.id} className="hover:bg-slate-50 transition-colors group">
                                                <td className="px-8 py-5">
                                                    <button onClick={() => setSelectedStudent(s)} className="text-left">
                                                        <div className="font-black text-sm group-hover:text-blue-600 transition-colors">{s.fname} {s.lname}</div>
                                                        <div className="text-[10px] text-slate-400 font-bold uppercase">{s.cohort}</div>
                                                    </button>
                                                </td>
                                                <td className="px-8 py-5 text-right">
                                                    <button onClick={() => setStudents(students.filter(st => st.id !== s.id))} className="text-slate-400 hover:text-red-600"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* Modules/Courses View */}
                        {activeView === 'courses' && (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                                    <div className="flex gap-3 overflow-x-auto pb-2 w-full md:w-auto">
                                        {['MMBA', 'EMBA', 'MEMBA'].map(track => (
                                            <div key={track} className="px-5 py-3 bg-white border border-slate-200 rounded-2xl min-w-[140px]">
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">{track} TRACK</p>
                                                <div className="flex items-center justify-between">
                                                    <p className="text-lg font-black">{courses.filter(c => c.track === track).length} <span className="text-xs text-slate-400">Courses</span></p>
                                                </div>
                                                <p className="text-[9px] font-bold text-blue-500 mt-1 uppercase">Cohorts 6 - 20 Active</p>
                                            </div>
                                        ))}
                                    </div>
                                    <button 
                                        onClick={() => setShowAddCourse(true)}
                                        className="px-6 py-4 bg-slate-900 text-white rounded-2xl text-xs font-black uppercase tracking-widest flex items-center gap-2 shadow-xl shadow-slate-900/10 hover:bg-slate-800 transition-all w-full md:w-auto justify-center"
                                    >
                                        <Icon name="plus" className="w-4 h-4" /> Add Module
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {courses.map(course => (
                                        <div key={course.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm relative group hover:border-blue-500/30 transition-all">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className={`px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${
                                                    course.track === 'MMBA' ? 'bg-blue-50 text-blue-600' :
                                                    course.track === 'EMBA' ? 'bg-purple-50 text-purple-600' : 'bg-orange-50 text-orange-600'
                                                }`}>
                                                    {course.track} Track
                                                </div>
                                                <button 
                                                    onClick={() => deleteCourse(course.id)}
                                                    className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all"
                                                >
                                                    <Icon name="trash-2" className="w-4 h-4" />
                                                </button>
                                            </div>
                                            <h4 className="text-xl font-black text-slate-900 line-clamp-1">{course.name}</h4>
                                            <p className="text-sm font-bold text-slate-400 mb-6 uppercase tracking-wider">{course.code}</p>
                                            <div className="flex items-center justify-between pt-6 border-t border-slate-100">
                                                <div className="flex items-center gap-1.5 text-slate-600">
                                                    <Icon name="award" className="w-4 h-4 text-blue-500" />
                                                    <span className="text-[11px] font-black uppercase tracking-widest">{course.units} Credit Units</span>
                                                </div>
                                                <div className="text-[9px] font-black text-slate-300 uppercase italic">Cohorts 6-20</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeView === 'activate' && (
                            <div className="bg-white p-10 rounded-[3rem] border border-slate-200 max-w-lg mx-auto text-center shadow-sm">
                                <div className="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-8">
                                    <Icon name="qr-code" className="w-10 h-10 text-blue-600" />
                                </div>
                                <h3 className="text-2xl font-black mb-4">Live Session Setup</h3>
                                <p className="text-slate-500 text-sm mb-8 font-medium">Select a cohort from the active range (6-20) to generate the session handshake.</p>
                                <div className="space-y-4 text-left">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Targeted Cohort</label>
                                        <select className="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold text-slate-700 focus:ring-2 ring-blue-500/20">
                                            {ALL_COHORTS.map(c => <option key={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <button className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl hover:bg-slate-800 transition-all">Initialize Live Sync</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showAddCourse && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 animate-in">
                                <h3 className="text-2xl font-black mb-8 flex items-center gap-3">
                                    <Icon name="book-open" className="text-blue-500" /> 
                                    New Module
                                </h3>
                                <form onSubmit={addCourse} className="space-y-6">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Program Track</label>
                                        <div className="flex gap-2">
                                            {['MMBA', 'EMBA', 'MEMBA'].map(t => (
                                                <button 
                                                    key={t}
                                                    type="button"
                                                    onClick={() => setNewCourse({...newCourse, track: t})}
                                                    className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border ${
                                                        newCourse.track === t ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-slate-50 border-slate-200 text-slate-400'
                                                    }`}
                                                >
                                                    {t}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="col-span-2 space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Module Code</label>
                                            <input 
                                                placeholder="e.g. MGT800"
                                                value={newCourse.code} 
                                                onChange={(e) => setNewCourse({...newCourse, code: e.target.value.toUpperCase()})} 
                                                className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold" 
                                            />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Units</label>
                                            <input 
                                                type="number"
                                                min="1"
                                                max="6"
                                                value={newCourse.units} 
                                                onChange={(e) => setNewCourse({...newCourse, units: e.target.value})} 
                                                className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold" 
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Course Title</label>
                                        <input 
                                            placeholder="Descriptive Title"
                                            value={newCourse.name} 
                                            onChange={(e) => setNewCourse({...newCourse, name: e.target.value})} 
                                            className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold" 
                                        />
                                    </div>
                                    <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                        <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1 text-center">Cohort Visibility</p>
                                        <p className="text-[9px] font-bold text-blue-400 text-center uppercase tracking-wider">This course will be active for Cohorts 6 through 20</p>
                                    </div>
                                    <div className="flex gap-4 pt-6">
                                        <button type="button" onClick={() => setShowAddCourse(false)} className="flex-1 py-4 text-slate-400 font-black text-[10px] uppercase tracking-widest">Discard</button>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl text-[10px] uppercase shadow-xl shadow-blue-500/20">Add Course</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast.visible && (
                        <div className="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] animate-in">
                            <Icon name="check-circle" className="w-4 h-4 text-blue-400" />
                            <span className="text-xs font-black uppercase tracking-wider">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        };

        const StatCard = ({ icon, label, value, trend, color }) => (
            <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm group hover:border-blue-500/30 transition-all">
                <div className={`w-10 h-10 ${color} rounded-xl flex items-center justify-center text-white mb-4`}>
                    <Icon name={icon} />
                </div>
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                <div className="flex items-baseline gap-2">
                    <h4 className="text-2xl font-black text-slate-900 tracking-tight">{value}</h4>
                    <span className={`text-[10px] font-black ${trend.includes('+') ? 'text-green-500' : 'text-blue-500 opacity-60'}`}>{trend}</span>
                </div>
            </div>
        );

        const StudentProfilePage = ({ student, onBack }) => (
            <div className="p-8 max-w-5xl mx-auto animate-in min-h-screen">
                <button onClick={onBack} className="mb-10 flex items-center gap-2 text-slate-400 hover:text-slate-900 font-black text-[10px] uppercase tracking-widest transition-colors">
                    <Icon name="arrow-left" className="w-4 h-4" /> Exit Profile
                </button>
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 text-center shadow-sm">
                        <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-2xl font-black shadow-lg">
                            {student.fname[0]}{student.lname[0]}
                        </div>
                        <h3 className="text-2xl font-black">{student.fname} {student.lname}</h3>
                        <p className="text-slate-400 font-black text-[10px] uppercase tracking-widest mt-1">{student.matric}</p>
                    </div>
                    <div className="lg:col-span-2 bg-white p-10 rounded-[2.5rem] border border-slate-200">
                        <h4 className="font-black text-lg mb-6 uppercase tracking-tight italic text-slate-900 text-center">Session Activity</h4>
                        <div className="space-y-4">
                            {[1, 2, 3].map(i => (
                                <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-slate-400"><Icon name="calendar" /></div>
                                        <div><p className="text-sm font-black">Module Session {i}</p></div>
                                    </div>
                                    <Icon name="check-circle" className="text-green-500" />
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
