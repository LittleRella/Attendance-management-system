<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Academic Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes scan {
            0%, 100% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(180px); opacity: 0.8; }
        }
        .scan-line {
            animation: scan 3s infinite ease-in-out;
            box-shadow: 0 0 15px 2px rgba(59, 130, 246, 0.5);
        }
        
        .sidebar-item-active { background-color: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .session-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
        .present { background-color: #10b981; }
        .absent { background-color: #e2e8f0; }
        
        .card-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04); }
        .modal-blur { background-color: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Custom Select Styling */
        .sim-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }
        .sim-input:focus { border-color: #3b82f6; background: rgba(255,255,255,0.1); }
        .sim-label { color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="w-[280px] bg-[#0b0f1a] text-white fixed h-full flex flex-col p-8 z-40">
            <div class="flex items-center gap-3 mb-12">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-500/30">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <h1 class="font-black text-2xl tracking-tighter text-white">ATTENDX</h1>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button onclick="switchView('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-slate-800/40 text-slate-400 font-bold text-sm">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="switchView('registry')" id="nav-registry" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-slate-800/40 text-slate-400 font-bold text-sm">
                    <i data-lucide="users" class="w-5 h-5"></i> Registry
                </button>
                <button onclick="switchView('courses')" id="nav-courses" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-slate-800/40 text-slate-400 font-bold text-sm">
                    <i data-lucide="book-open" class="w-5 h-5"></i> Manage Courses
                </button>
                <button onclick="switchView('matrix')" id="nav-matrix" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all hover:bg-slate-800/40 text-slate-400 font-bold text-sm">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i> Session Matrix
                </button>
            </nav>

            <div class="mt-auto">
                <button onclick="switchView('activate')" id="nav-activate" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-sm tracking-wide shadow-xl shadow-blue-900/40 flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                    <i data-lucide="smartphone" class="w-5 h-5"></i> ACTIVATE SIM
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="ml-[280px] flex-1 p-12">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h2 id="view-title" class="text-3xl font-black tracking-tight text-slate-900">Dashboard</h2>
                    <p id="view-desc" class="text-slate-400 font-medium text-sm mt-1">Monitoring academic compliance.</p>
                </div>
                
                <div id="header-filter-area" class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 text-white">Global Filter</p>
                        <select id="global-cohort-filter" onchange="refreshView()" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-xs font-bold shadow-sm outline-none focus:ring-2 ring-blue-500/20 cursor-pointer">
                            <option value="ALL">All Cohorts</option>
                        </select>
                    </div>
                </div>
            </header>

            <div id="view-mount" class="fade-in"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="confirm-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 modal-blur" onclick="closeConfirmModal()"></div>
        <div class="relative w-full max-w-sm bg-white p-10 rounded-[3rem] card-shadow text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="trash-2" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-black mb-2">Delete Record?</h3>
            <p id="confirm-msg" class="text-slate-500 text-sm mb-8 leading-relaxed">This action will remove the record from the database permanently.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-4 font-bold text-slate-400 hover:bg-slate-50 rounded-2xl transition-all">Cancel</button>
                <button id="modal-confirm-btn" class="flex-1 py-4 font-black bg-red-600 text-white rounded-2xl hover:bg-red-700 transition-all shadow-lg shadow-red-200">Delete</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 right-10 bg-[#0b0f1a] text-white px-8 py-5 rounded-[1.5rem] shadow-2xl flex items-center gap-4 transform translate-y-32 transition-transform duration-500 z-50 border border-white/5">
        <div class="bg-blue-500/20 text-blue-400 p-2 rounded-xl"><i data-lucide="bell" class="w-4 h-4"></i></div>
        <span id="toast-text" class="text-sm font-bold">Updated Successfully</span>
    </div>

    <script>
        // --- Core Application State ---
        let courses = [
            { id: 'c1', code: 'CSC101', name: 'Intro to Programming' },
            { id: 'c2', code: 'PHY201', name: 'General Physics II' }
        ];

        let students = [
            { id: 's1', matric: '24/CSC/001', fname: 'Faith', lname: 'Okon', email: 'faith@uni.edu', phone: '0801', course: 'CSC101', cohort: 'MMBA 10', sessions: Array(22).fill(0) },
            { id: 's2', matric: '24/BE/012', fname: 'Bello', lname: 'Ibrahim', email: 'bello@uni.edu', phone: '0812', course: 'CSC101', cohort: 'MMBA 10', sessions: Array(22).fill(0) }
        ];

        const cohorts = ["MMBA 10", "MMBA 11", "EMBA 30"];
        let activeView = 'dashboard';

        function switchView(view) {
            activeView = view;
            const mount = document.getElementById('view-mount');
            const title = document.getElementById('view-title');
            const desc = document.getElementById('view-desc');

            document.querySelectorAll('aside nav button, aside .mt-auto button').forEach(b => b.classList.remove('sidebar-item-active', 'text-white'));
            const activeBtn = document.getElementById(`nav-${view}`);
            if (activeBtn) activeBtn.classList.add('sidebar-item-active');

            if (view === 'dashboard') {
                title.innerText = "Dashboard"; desc.innerText = "Monitoring academic compliance.";
                renderDashboard(mount);
            } else if (view === 'registry') {
                title.innerText = "Registry"; desc.innerText = "Manage student information.";
                renderRegistry(mount);
            } else if (view === 'courses') {
                title.innerText = "Course Management"; desc.innerText = "Manage academic modules.";
                renderCourses(mount);
            } else if (view === 'matrix') {
                title.innerText = "Session Matrix"; desc.innerText = "Attendance history grid.";
                renderMatrix(mount);
            } else if (view === 'activate') {
                title.innerText = "Student Simulator"; desc.innerText = "Simulate a mobile attendance scan.";
                renderActivate(mount);
            }
            lucide.createIcons();
        }

        function refreshView() { switchView(activeView); }

        function renderDashboard(el) {
            const list = students;
            const totalSlots = list.length * 22;
            const presentSlots = list.reduce((acc, s) => acc + s.sessions.filter(v => v === 1).length, 0);
            const rate = totalSlots ? (presentSlots / totalSlots * 100).toFixed(1) : 0;

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Avg Compliance</p>
                        <h4 class="text-4xl font-black text-blue-600">${rate}%</h4>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Active Students</p>
                        <h4 class="text-4xl font-black text-slate-900">${list.length}</h4>
                    </div>
                </div>
            `;
        }

        function renderRegistry(el) {
            el.innerHTML = `
                <div class="bg-white rounded-[3rem] card-shadow border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <tr><th class="px-8 py-6">Student</th><th class="px-8 py-6 text-right">Actions</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${students.map(s => `<tr><td class="px-8 py-6 font-bold text-sm">${s.fname} ${s.lname}</td><td class="px-8 py-6 text-right"><button onclick="reqDelete('s','${s.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderCourses(el) { el.innerHTML = `<div class="p-10 text-slate-400 font-bold">Course Management Content...</div>`; }

        function renderMatrix(el) {
            el.innerHTML = `
                <div class="bg-white rounded-[3rem] card-shadow border border-slate-100 p-10 overflow-x-auto">
                    <div class="min-w-[800px] space-y-2">
                        ${students.map(s => `
                            <div class="flex items-center gap-6 p-4 bg-slate-50/50 rounded-2xl">
                                <div class="w-48 font-black text-xs truncate">${s.fname} ${s.lname}</div>
                                <div class="flex-1 flex gap-1.5">
                                    ${s.sessions.map((v, i) => `<div class="w-3 h-3 rounded-sm ${v === 1 ? 'present' : 'absent'}"></div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderActivate(el) {
            el.innerHTML = `
                <div class="flex flex-col items-center py-6">
                    <div class="w-[340px] h-[680px] bg-slate-900 rounded-[3.5rem] border-[12px] border-slate-800 shadow-2xl overflow-hidden relative p-4 flex flex-col">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-800 rounded-b-2xl z-20"></div>
                        
                        <div class="flex-1 bg-[#0b0f1a] rounded-[2.5rem] overflow-hidden relative flex flex-col p-6 text-white">
                            <div class="mt-8 mb-6">
                                <h3 class="text-xl font-black">Attendance SIM</h3>
                                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Session Active: EMBA 10</p>
                            </div>

                            <div class="space-y-5 mb-8">
                                <div>
                                    <label class="sim-label">1. Session Type</label>
                                    <div class="flex gap-2">
                                        <button onclick="setSimType('Physical')" id="type-Physical" class="flex-1 py-3 rounded-xl border border-white/10 text-xs font-bold transition-all bg-blue-600 text-white">Physical</button>
                                        <button onclick="setSimType('Virtual')" id="type-Virtual" class="flex-1 py-3 rounded-xl border border-white/10 text-xs font-bold transition-all bg-white/5 text-slate-400">Virtual</button>
                                    </div>
                                </div>

                                <div>
                                    <label class="sim-label">2. Select Student</label>
                                    <select id="sim-student-id" class="sim-input cursor-pointer">
                                        <option value="">-- Choose Student --</option>
                                        ${students.map(s => `<option value="${s.id}">${s.fname} ${s.lname} (${s.matric})</option>`).join('')}
                                    </select>
                                </div>

                                <div>
                                    <label class="sim-label">3. Session Number</label>
                                    <select id="sim-session-num" class="sim-input">
                                        ${Array.from({length:22}, (_,i)=>`<option value="${i}">Session ${i+1}</option>`).join('')}
                                    </select>
                                </div>
                            </div>

                            <div class="w-full aspect-square border border-blue-500/20 rounded-2xl mb-8 flex items-center justify-center relative bg-white/[0.02]">
                                <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-blue-500/50 -mt-1 -ml-1"></div>
                                <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-blue-500/50 -mt-1 -mr-1"></div>
                                <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-blue-500/50 -mb-1 -ml-1"></div>
                                <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-blue-500/50 -mb-1 -mr-1"></div>
                                <div class="absolute inset-x-4 h-[1px] bg-blue-400 scan-line"></div>
                                <i data-lucide="scan" class="w-12 h-12 text-white/5"></i>
                            </div>

                            <button onclick="processSimScan()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-sm tracking-wider shadow-lg shadow-blue-900 active:scale-95 transition-all">
                                SUBMIT ATTENDANCE
                            </button>
                            
                            <p class="mt-4 text-[9px] text-center font-bold text-slate-600 tracking-[0.2em]">SECURE SCAN SYSTEM v2.0</p>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        let currentSimType = 'Physical';
        function setSimType(type) {
            currentSimType = type;
            document.querySelectorAll('[id^="type-"]').forEach(btn => {
                btn.className = "flex-1 py-3 rounded-xl border border-white/10 text-xs font-bold transition-all bg-white/5 text-slate-400";
            });
            const active = document.getElementById(`type-${type}`);
            active.className = "flex-1 py-3 rounded-xl border border-white/10 text-xs font-bold transition-all bg-blue-600 text-white";
        }

        function processSimScan() {
            const stuId = document.getElementById('sim-student-id').value;
            const sessionIdx = parseInt(document.getElementById('sim-session-num').value);
            
            if (!stuId) return showToast("Please select a student first");

            const student = students.find(s => s.id === stuId);
            if (student) {
                student.sessions[sessionIdx] = 1;
                showToast(`Verified: ${student.fname} for ${currentSimType} session ${sessionIdx+1}`);
                setTimeout(() => switchView('matrix'), 1000);
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = m;
            t.classList.remove('translate-y-32');
            setTimeout(() => t.classList.add('translate-y-32'), 3000);
        }

        function reqDelete(type, id) {
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('modal-confirm-btn').onclick = () => {
                students = students.filter(s => s.id !== id);
                refreshView();
                closeConfirmModal();
            };
        }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

        function init() { switchView('dashboard'); }
        init();
    </script>
</body>
</html>
