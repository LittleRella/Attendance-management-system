<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Management Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f1f5f9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Simple Lucide Icon Component Wrapper
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeView, setActiveView] = useState('overview');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [editingStudent, setEditingStudent] = useState(null);
            const [attendanceMode, setAttendanceMode] = useState('physical');
            const [toast, setToast] = useState({ visible: false, message: '' });
            
            const [filters, setFilters] = useState({
                semester: 'Semester 1',
                year: '2024',
                month: 'January',
                date: new Date().toISOString().split('T')[0],
                cohort: 'MMBA 10',
                course: 'BUS701'
            });

            const [students, setStudents] = useState([
                { id: 's1', matric: '24/MMBA/001', fname: 'Sarah', lname: 'Ade', email: 'sarah.ade@edu.ng', phone: '+234 802 345 6789', cohort: 'MMBA 10', yield: 88, status: 'Active' },
                { id: 's2', matric: '24/EMBA/012', fname: 'John', lname: 'Doe', email: 'j.doe@corp.com', phone: '+234 810 123 4567', cohort: 'EMBA 31', yield: 72, status: 'Active' },
                { id: 's3', matric: '24/MEM/045', fname: 'Grace', lname: 'Eze', email: 'grace@edu.ng', phone: '+234 703 987 6543', cohort: 'MEMBA 13', yield: 95, status: 'Active' },
                { id: 's4', matric: '24/MMBA/002', fname: 'David', lname: 'Okon', email: 'david@gmail.com', phone: '+234 905 555 1234', cohort: 'MMBA 6', yield: 64, status: 'Warning' }
            ]);

            const generateRange = (prefix, start, end) => {
                const arr = [];
                for (let i = start; i <= end; i++) arr.push(`${prefix} ${i}`);
                return arr;
            };

            const ALL_COHORTS = [...generateRange("MMBA", 6, 20), ...generateRange("MEMBA", 13, 20), ...generateRange("EMBA", 31, 40)];
            const courses = [
                { id: 'c1', code: 'BUS701', name: 'Strategic Management' },
                { id: 'c2', code: 'FIN702', name: 'Corporate Finance' },
                { id: 'c3', code: 'MKT703', name: 'Digital Marketing' },
                { id: 'c4', code: 'OPS704', name: 'Operations Logic' }
            ];

            const showToast = (msg) => {
                setToast({ visible: true, message: msg });
                setTimeout(() => setToast({ visible: false, message: '' }), 3000);
            };

            const deleteStudent = (id) => {
                setStudents(students.filter(s => s.id !== id));
                showToast("Student record deleted.");
            };

            const saveEdit = (e) => {
                e.preventDefault();
                setStudents(students.map(s => s.id === editingStudent.id ? editingStudent : s));
                setEditingStudent(null);
                showToast("Student details updated.");
            };

            if (selectedStudent) {
                return (
                    <div className="p-8 max-w-5xl mx-auto animate-in">
                        <button onClick={() => setSelectedStudent(null)} className="mb-10 flex items-center gap-2 text-slate-400 hover:text-slate-900 font-black text-[10px] uppercase tracking-widest transition-colors">
                            <Icon name="arrow-left" className="w-4 h-4" /> Back to Directory
                        </button>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="space-y-8">
                                <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 text-center shadow-sm">
                                    <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-2xl font-black shadow-lg shadow-blue-500/20">
                                        {selectedStudent.fname[0]}{selectedStudent.lname[0]}
                                    </div>
                                    <h3 className="text-2xl font-black">{selectedStudent.fname} {selectedStudent.lname}</h3>
                                    <p className="text-slate-400 font-black text-[10px] uppercase tracking-widest mt-1">{selectedStudent.matric}</p>
                                    <div className="mt-6 px-4 py-1.5 bg-green-50 text-green-600 rounded-full text-[9px] font-black inline-block uppercase">
                                        {selectedStudent.status}
                                    </div>
                                </div>
                            </div>
                            <div className="lg:col-span-2 space-y-8">
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Engagement Index</p>
                                        <div className="flex items-end gap-2">
                                            <span className="text-5xl font-black leading-none">{selectedStudent.yield}%</span>
                                            <span className="text-xs font-black text-green-500 mb-1">High</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen">
                    <aside className="w-[260px] bg-[#0f172a] text-white fixed h-full flex flex-col z-40">
                        <div className="p-8 flex items-center gap-3">
                            <div className="bg-blue-500 p-2 rounded-lg">
                                <Icon name="activity" className="w-5 h-5 text-white" />
                            </div>
                            <span className="font-black text-xl uppercase italic">AttendX</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-1">
                            {[{ id: 'overview', icon: 'layout-grid', label: 'Dashboard' },
                              { id: 'registry', icon: 'users', label: 'Participants' },
                              { id: 'courses', icon: 'book-open', label: 'Modules' }].map(item => (
                                <button key={item.id} onClick={() => setActiveView(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-sm transition-all ${activeView === item.id ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={item.icon} /> {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6">
                            <button onClick={() => setActiveView('activate')} className="w-full bg-slate-800 py-4 rounded-xl font-black text-xs tracking-widest flex items-center justify-center gap-2 border border-slate-700">
                                <Icon name="qr-code" className="w-4 h-4 text-blue-400" /> LIVE SESSION
                            </button>
                        </div>
                    </aside>

                    <main className="ml-[260px] flex-1 p-8">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-3xl font-black tracking-tight">{activeView.toUpperCase()}</h2>
                                <p className="text-slate-500 font-medium text-sm">Managing AttendX Platform Assets</p>
                            </div>
                        </header>

                        <div className="animate-in">
                            {activeView === 'overview' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <div className="bg-white p-6 rounded-[2rem] border border-slate-200">
                                        <Icon name="users" className="text-blue-500 mb-4" />
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Total Participants</p>
                                        <h4 className="text-2xl font-black">1,248</h4>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] border border-slate-200">
                                        <Icon name="trending-up" className="text-green-500 mb-4" />
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Avg. Attendance</p>
                                        <h4 className="text-2xl font-black">84.2%</h4>
                                    </div>
                                </div>
                            )}

                            {activeView === 'registry' && (
                                <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                            <tr>
                                                <th className="px-8 py-5">Full Name</th>
                                                <th className="px-8 py-5">Matric No</th>
                                                <th className="px-8 py-5 text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {students.map(s => (
                                                <tr key={s.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-8 py-5">
                                                        <button onClick={() => setSelectedStudent(s)} className="text-left">
                                                            <div className="font-black text-sm text-slate-900">{s.fname} {s.lname}</div>
                                                            <div className="text-[10px] text-slate-400">{s.cohort}</div>
                                                        </button>
                                                    </td>
                                                    <td className="px-8 py-5 font-mono text-[11px] font-black">{s.matric}</td>
                                                    <td className="px-8 py-5 text-right">
                                                        <button onClick={() => deleteStudent(s.id)} className="p-2 text-slate-400 hover:text-red-600">
                                                            <Icon name="trash-2" className="w-4 h-4" />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeView === 'activate' && (
                                <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 text-center">
                                    <Icon name="qr-code" className="w-16 h-16 text-blue-500 mx-auto mb-6" />
                                    <h3 className="text-xl font-black">Generate Session Token</h3>
                                    <button onClick={() => showToast("Token Generated")} className="mt-8 px-8 py-4 bg-slate-900 text-white rounded-xl font-black uppercase text-xs tracking-widest">Initialize</button>
                                </div>
                            )}
                        </div>
                    </main>

                    {toast.visible && (
                        <div className="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] animate-in">
                            <Icon name="check-circle" className="w-4 h-4 text-blue-400" />
                            <span className="text-xs font-black uppercase tracking-wider">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
