<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Advanced Admin & Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .session-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
        .present { background-color: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .absent { background-color: #e2e8f0; }
        
        #qrcode img { margin: 0 auto; border: 12px solid white; border-radius: 24px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .modal-overlay { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-[#0f172a] text-white p-6 fixed h-full flex flex-col z-30 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/40"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
                <h1 class="font-black text-xl tracking-tighter">ATTENDX</h1>
            </div>
            
            <nav class="space-y-1 flex-1">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800/50">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Dashboard</span>
                </button>
                <button onclick="switchView('students')" id="btn-students" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800/50">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Registry</span>
                </button>
                <button onclick="switchView('courses')" id="btn-courses" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800/50">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Manage Courses</span>
                </button>
                <button onclick="switchView('matrix')" id="btn-matrix" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-800/50">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Session Matrix</span>
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t border-slate-800/50">
                <button onclick="switchView('qr-launcher')" id="btn-qr" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-sm font-black shadow-xl shadow-blue-900/40 transition-all active:scale-95">
                    <i data-lucide="qr-code" class="w-5 h-5"></i> ACTIVATE QR
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="ml-64 flex-1 p-10 transition-all duration-300">
            <header id="main-header" class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-black text-slate-900 tracking-tight">Dashboard</h2>
                    <p id="page-subtitle" class="text-slate-400 text-sm font-medium">Monitoring academic compliance.</p>
                </div>
                <div class="flex items-center gap-3" id="header-actions">
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Global Filter</label>
                        <select id="global-cohort-filter" onchange="refreshView()" class="bg-white border-2 border-slate-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-blue-600 transition-all cursor-pointer shadow-sm">
                            <option value="ALL">All Cohorts</option>
                        </select>
                    </div>
                </div>
            </header>

            <div id="view-container" class="fade-in"></div>
        </main>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 modal-overlay" onclick="closeConfirmModal()"></div>
        <div class="relative w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="alert-triangle" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-black mb-2">Are you sure?</h3>
            <p id="confirm-text" class="text-slate-500 text-sm mb-8">This action cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200">Cancel</button>
                <button id="confirm-proceed-btn" class="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black hover:bg-red-700">Delete</button>
            </div>
        </div>
    </div>

    <!-- Student Scanning View Overlay (Simulator) -->
    <div id="student-view" class="fixed inset-0 bg-slate-50 z-[100] hidden flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-md bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="user-check" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">Confirm Attendance</h2>
            <p class="text-slate-500 text-sm mb-8">Select your name to mark presence for today.</p>
            <div class="space-y-6 text-left">
                <select id="student-select" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600 appearance-none"></select>
                <button onclick="submitStudentAttendance()" class="w-full bg-[#0f172a] text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition-all">CONFIRM</button>
                <button onclick="closeStudentView()" class="w-full text-slate-400 font-bold text-sm mt-4">Close Simulator</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 right-10 bg-[#0f172a] text-white px-8 py-5 rounded-[1.5rem] shadow-2xl flex items-center gap-4 transform translate-y-32 transition-transform duration-500 z-50 border border-slate-800">
        <div class="bg-blue-500 p-1.5 rounded-lg"><i data-lucide="bell" class="w-4 h-4"></i></div>
        <span id="toast-text" class="text-sm font-bold">Action completed</span>
    </div>

    <script>
        // --- DATA STATE ---
        const cohorts = [
            "MMBA 6", "MMBA 7", "MMBA 8", "MMBA 9", "MMBA 10", "MMBA 11", "MMBA 12", "MMBA 13", "MMBA 14",
            "EMBA 30", "EMBA 31", "EMBA 32", "EMBA 33", "EMBA 34",
            "MEMBA 13", "MEMBA 14", "MEMBA 15", "MEMBA 16", "MEMBA 17", "MEMBA 18"
        ];

        let courses = [
            { id: 'c1', code: 'CSC101', name: 'Intro to Programming' },
            { id: 'c2', code: 'PHY201', name: 'General Physics II' },
            { id: 'c3', code: 'BE', name: 'Business Ethics' },
            { id: 'c4', code: 'NHB', name: 'Nature of Human Beings' }
        ];

        let students = [
            { id: 's1', matric: '24/CSC/001', firstName: 'Faith', lastName: 'Okon', email: 'faith.o@uni.edu', phone: '08012345678', courseCode: 'CSC101', cohort: 'MMBA 6', sessions: Array(22).fill(0), pic: 'https://i.pravatar.cc/150?u=s1' },
            { id: 's2', matric: '24/MMB/012', firstName: 'John', lastName: 'Musa', email: 'j.musa@uni.edu', phone: '08123456789', courseCode: 'BE', cohort: 'MMBA 7', sessions: Array(22).fill(1).map((x,i) => i < 5 ? 1 : 0), pic: 'https://i.pravatar.cc/150?u=s2' }
        ];

        let activeView = 'dashboard';
        let liveSession = null;
        let timerInterval = null;
        
        // Editing state
        let editCourseId = null;
        let editStudentId = null;

        // --- INITIALIZATION ---
        function initApp() {
            populateCohortFilters();
            switchView('dashboard');
        }

        function populateCohortFilters() {
            const select = document.getElementById('global-cohort-filter');
            cohorts.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.innerText = c;
                select.appendChild(opt);
            });
        }

        // --- NAVIGATION ---
        function switchView(view) {
            activeView = view;
            resetFormStates();
            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('bg-blue-600', 'text-white');
                l.classList.add('hover:bg-slate-800/50');
            });
            
            if (view === 'dashboard') {
                title.innerText = "Dashboard Overview";
                subtitle.innerText = "General statistics and student compliance.";
                document.getElementById('btn-dashboard').classList.add('bg-blue-600', 'text-white');
                renderDashboard(container);
            } else if (view === 'students') {
                title.innerText = "Student Registry";
                subtitle.innerText = "Manage student information and enrollments.";
                document.getElementById('btn-students').classList.add('bg-blue-600', 'text-white');
                renderRegistry(container);
            } else if (view === 'courses') {
                title.innerText = "Course Management";
                subtitle.innerText = "Add, edit, or remove academic modules.";
                document.getElementById('btn-courses').classList.add('bg-blue-600', 'text-white');
                renderCourses(container);
            } else if (view === 'matrix') {
                title.innerText = "Attendance Matrix";
                subtitle.innerText = "Visual grid of all 22 sessions.";
                document.getElementById('btn-matrix').classList.add('bg-blue-600', 'text-white');
                renderMatrix(container);
            } else if (view === 'qr-launcher') {
                title.innerText = "Activate Session";
                renderQRLauncher(container);
            } else if (view === 'live-qr') {
                title.innerText = "Active QR Code";
                renderLiveQR(container);
            }
            lucide.createIcons();
        }

        function refreshView() { switchView(activeView); }
        function resetFormStates() { editCourseId = null; editStudentId = null; }

        // --- MODALS ---
        let confirmAction = null;
        function showConfirmModal(text, onProceed) {
            document.getElementById('confirm-text').innerText = text;
            confirmAction = onProceed;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); confirmAction = null; }
        document.getElementById('confirm-proceed-btn').onclick = () => { if(confirmAction) confirmAction(); closeConfirmModal(); };

        // --- DASHBOARD ---
        function renderDashboard(el) {
            const cohortFilter = document.getElementById('global-cohort-filter').value;
            const list = cohortFilter === 'ALL' ? students : students.filter(s => s.cohort === cohortFilter);
            const totalSessPossible = list.length * 22;
            const actualPresent = list.reduce((acc, s) => acc + s.sessions.filter(v => v === 1).length, 0);
            const rate = totalSessPossible ? ((actualPresent / totalSessPossible) * 100).toFixed(1) : 0;

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm transition-transform hover:scale-[1.01]">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Compliance Rate</p>
                        <h3 class="text-4xl font-black text-blue-600">${rate}%</h3>
                        <div class="mt-4 w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600" style="width: ${rate}%"></div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm transition-transform hover:scale-[1.01]">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Students</p>
                        <h3 class="text-4xl font-black text-slate-900">${list.length}</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm transition-transform hover:scale-[1.01]">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Active View</p>
                        <h3 class="text-xl font-black text-slate-900">${cohortFilter === 'ALL' ? 'Entire System' : cohortFilter}</h3>
                    </div>
                </div>
            `;
        }

        // --- COURSE MANAGEMENT ---
        function renderCourses(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm sticky top-10 h-fit">
                        <h4 id="course-form-title" class="font-black text-lg mb-6">Manage Module</h4>
                        <div class="space-y-4">
                            <input id="new-course-code" placeholder="CSC101" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600 transition-all">
                            <input id="new-course-name" placeholder="Course Title" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600 transition-all">
                            <button id="course-action-btn" onclick="saveCourse()" class="w-full bg-[#0f172a] text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition-all">Add Course</button>
                            <button id="course-cancel-btn" onclick="cancelCourseEdit()" class="w-full hidden text-slate-400 font-bold text-sm">Cancel Edit</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                <tr><th class="px-8 py-5">Code</th><th class="px-8 py-5">Name</th><th class="px-8 py-5 text-right">Actions</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${courses.map(c => `
                                    <tr class="hover:bg-slate-50/50 transition-colors">
                                        <td class="px-8 py-5 font-black text-blue-600">${c.code}</td>
                                        <td class="px-8 py-5 font-bold text-slate-700">${c.name}</td>
                                        <td class="px-8 py-5 text-right space-x-2">
                                            <button onclick="editCourse('${c.id}')" class="p-2 text-slate-300 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                            <button onclick="requestDeleteCourse('${c.id}')" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function saveCourse() {
            const code = document.getElementById('new-course-code').value.trim().toUpperCase();
            const name = document.getElementById('new-course-name').value.trim();
            if (!code || !name) return showToast("Fields are required");

            if (editCourseId) {
                const idx = courses.findIndex(c => c.id === editCourseId);
                courses[idx] = { ...courses[idx], code, name };
                showToast("Course updated");
            } else {
                courses.push({ id: 'c' + Date.now(), code, name });
                showToast("Course added");
            }
            refreshView();
        }

        function editCourse(id) {
            const c = courses.find(x => x.id === id);
            editCourseId = id;
            document.getElementById('new-course-code').value = c.code;
            document.getElementById('new-course-name').value = c.name;
            document.getElementById('course-action-btn').innerText = "Update Course";
            document.getElementById('course-form-title').innerText = "Edit Module";
            document.getElementById('course-cancel-btn').classList.remove('hidden');
        }

        function cancelCourseEdit() { refreshView(); }

        function requestDeleteCourse(id) {
            showConfirmModal("Are you sure you want to remove this course? This will not affect existing student records.", () => {
                courses = courses.filter(c => c.id !== id);
                showToast("Course removed");
                refreshView();
            });
        }

        // --- REGISTRY ---
        function renderRegistry(el) {
            const cohortFilter = document.getElementById('global-cohort-filter').value;
            const list = cohortFilter === 'ALL' ? students : students.filter(s => s.cohort === cohortFilter);
            
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div class="space-y-8">
                        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm sticky top-10">
                            <h4 id="student-form-title" class="font-black text-lg mb-6 flex items-center gap-2">Enrollment</h4>
                            <div class="space-y-3">
                                <input id="stu-firstname" placeholder="First Name" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm">
                                <input id="stu-lastname" placeholder="Last Name" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm">
                                <input id="stu-matric" placeholder="Matric No." class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm">
                                <input id="stu-email" placeholder="Email Address" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm">
                                <input id="stu-phone" placeholder="Phone Number" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm">
                                <select id="stu-cohort" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm">
                                    <option value="">Select Cohort...</option>
                                    ${cohorts.map(c => `<option value="${c}">${c}</option>`).join('')}
                                </select>
                                <select id="stu-course" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm">
                                    ${courses.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}
                                </select>
                                <button id="stu-action-btn" onclick="saveStudent()" class="w-full bg-[#0f172a] text-white py-4 rounded-xl font-black hover:bg-blue-600 transition-all text-sm mt-2">Enroll Student</button>
                                <button id="stu-cancel-btn" onclick="cancelStudentEdit()" class="w-full hidden text-slate-400 font-bold text-sm">Cancel Edit</button>
                            </div>
                        </div>

                        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                            <h4 class="font-black text-lg mb-4 flex items-center gap-2"><i data-lucide="layers" class="text-blue-600 w-5 h-5"></i> Bulk Upload</h4>
                            <p class="text-[10px] text-slate-400 font-bold mb-4 uppercase tracking-wider underline cursor-pointer">Download Template</p>
                            <textarea id="bulk-input" placeholder="First, Last, Matric, Email, Phone..." class="w-full h-32 bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold text-xs outline-none focus:border-blue-600 mb-4 no-scrollbar"></textarea>
                            <select id="bulk-cohort" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold outline-none focus:border-blue-600 text-sm mb-4">
                                ${cohorts.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                            <button onclick="processBulk()" class="w-full bg-purple-600 text-white py-4 rounded-xl font-black hover:bg-purple-700 transition-all text-sm">UPLOAD BATCH</button>
                        </div>
                    </div>

                    <div class="lg:col-span-3 bg-white rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden flex flex-col h-fit">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                <tr><th class="px-8 py-5">Student</th><th class="px-8 py-5">Matric</th><th class="px-8 py-5">Cohort</th><th class="px-8 py-5 text-right">Actions</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${list.map(s => `
                                    <tr class="hover:bg-slate-50/50 transition-colors">
                                        <td class="px-8 py-5">
                                            <div class="flex items-center gap-4">
                                                <img src="${s.pic}" class="w-10 h-10 rounded-xl bg-slate-100 object-cover">
                                                <div>
                                                    <p class="font-black text-sm">${s.firstName} ${s.lastName}</p>
                                                    <span class="text-[9px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-black tracking-wide">${s.courseCode}</span>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-8 py-5 font-mono text-xs font-bold text-slate-400">${s.matric}</td>
                                        <td class="px-8 py-5 font-bold text-slate-600 text-sm">${s.cohort}</td>
                                        <td class="px-8 py-5 text-right space-x-1">
                                            <button onclick="editStudent('${s.id}')" class="p-2 text-slate-300 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                            <button onclick="requestDeleteStudent('${s.id}')" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        ${list.length === 0 ? `<div class="p-20 text-center text-slate-300 font-bold">No students found</div>` : ''}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function saveStudent() {
            const firstName = document.getElementById('stu-firstname').value.trim();
            const lastName = document.getElementById('stu-lastname').value.trim();
            const matric = document.getElementById('stu-matric').value.trim().toUpperCase();
            const email = document.getElementById('stu-email').value.trim();
            const phone = document.getElementById('stu-phone').value.trim();
            const cohort = document.getElementById('stu-cohort').value;
            const courseCode = document.getElementById('stu-course').value;

            if(!firstName || !lastName || !matric || !cohort) return showToast("Required fields missing");

            if (editStudentId) {
                const idx = students.findIndex(s => s.id === editStudentId);
                students[idx] = { ...students[idx], firstName, lastName, matric, email, phone, cohort, courseCode };
                showToast("Student profile updated");
            } else {
                students.push({
                    id: 's' + Date.now(), matric, firstName, lastName, email, phone, cohort, courseCode,
                    sessions: Array(22).fill(0), pic: `https://i.pravatar.cc/150?u=${Date.now()}`
                });
                showToast("Student enrolled");
            }
            refreshView();
        }

        function editStudent(id) {
            const s = students.find(x => x.id === id);
            editStudentId = id;
            document.getElementById('stu-firstname').value = s.firstName;
            document.getElementById('stu-lastname').value = s.lastName;
            document.getElementById('stu-matric').value = s.matric;
            document.getElementById('stu-email').value = s.email;
            document.getElementById('stu-phone').value = s.phone;
            document.getElementById('stu-cohort').value = s.cohort;
            document.getElementById('stu-course').value = s.courseCode;
            
            document.getElementById('stu-action-btn').innerText = "Update Record";
            document.getElementById('student-form-title').innerText = "Edit Record";
            document.getElementById('stu-cancel-btn').classList.remove('hidden');
        }

        function cancelStudentEdit() { refreshView(); }

        function requestDeleteStudent(id) {
            showConfirmModal("Are you sure you want to delete this student record? All attendance history for this student will be lost.", () => {
                students = students.filter(s => s.id !== id);
                showToast("Student record deleted");
                refreshView();
            });
        }

        function processBulk() {
            const cohort = document.getElementById('bulk-cohort').value;
            const text = document.getElementById('bulk-input').value;
            if(!text || !cohort) return showToast("Select cohort and provide data");
            
            const lines = text.split('\n');
            let count = 0;
            lines.forEach(line => {
                const parts = line.split(',').map(p => p.trim());
                if (parts.length >= 3) {
                    students.push({
                        id: 's' + Date.now() + Math.random(),
                        firstName: parts[0], lastName: parts[1], matric: parts[2].toUpperCase(),
                        email: parts[3] || '', phone: parts[4] || '', cohort,
                        courseCode: courses[0].code, sessions: Array(22).fill(0),
                        pic: `https://i.pravatar.cc/150?u=${Math.random()}`
                    });
                    count++;
                }
            });
            showToast(`Uploaded ${count} records`);
            refreshView();
        }

        // --- MATRIX ---
        function renderMatrix(el) {
            const cohortFilter = document.getElementById('global-cohort-filter').value;
            const list = cohortFilter === 'ALL' ? students : students.filter(s => s.cohort === cohortFilter);
            el.innerHTML = `
                <div class="bg-white rounded-[3rem] border border-slate-100 p-8 shadow-sm">
                    <div class="flex items-center gap-6 mb-4 px-4 text-[10px] font-black text-slate-300 uppercase">
                        <div class="w-48">Student Info</div>
                        <div class="flex-1 flex gap-1.5">Sessions 1-22</div>
                    </div>
                    <div class="space-y-2">
                        ${list.map(s => `
                            <div class="flex items-center gap-6 p-4 bg-slate-50/50 rounded-2xl border border-transparent hover:border-slate-100 hover:bg-white transition-all group">
                                <div class="w-48 shrink-0">
                                    <p class="font-black text-slate-800 text-sm truncate">${s.firstName} ${s.lastName}</p>
                                    <p class="text-[9px] font-black text-blue-500 uppercase">${s.matric} • ${s.cohort}</p>
                                </div>
                                <div class="flex-1 flex gap-1.5 overflow-x-auto no-scrollbar py-1">
                                    ${s.sessions.map(v => `<div class="session-dot ${v === 1 ? 'present' : 'absent'}"></div>`).join('')}
                                </div>
                                <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="text-[10px] font-black text-slate-400">${Math.round((s.sessions.filter(x => x===1).length/22)*100)}%</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- QR / SESSION LOGIC ---
        function renderQRLauncher(el) {
            el.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-12 rounded-[4rem] border border-slate-100 shadow-xl text-center">
                    <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8">
                        <i data-lucide="qr-code" class="w-10 h-10"></i>
                    </div>
                    <h3 class="text-3xl font-black mb-10">Launch New Session</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-left">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2 block">Cohort</label>
                            <select id="launch-cohort" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 font-bold outline-none focus:border-blue-600">
                                ${cohorts.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2 block">Session Number</label>
                            <select id="launch-session" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 font-bold outline-none focus:border-blue-600">
                                ${Array.from({length: 22}, (_, i) => `<option value="${i+1}">Session ${i+1}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <button onclick="startQRSession()" class="w-full bg-[#0f172a] text-white py-6 rounded-[2.5rem] font-black text-lg hover:bg-blue-600 transition-all">GENERATE QR CODE</button>
                </div>
            `;
            lucide.createIcons();
        }

        function startQRSession() {
            const cohort = document.getElementById('launch-cohort').value;
            const sess = parseInt(document.getElementById('launch-session').value) - 1;
            liveSession = { cohort, sessionIndex: sess, expiry: Date.now() + (15 * 60 * 1000) };
            switchView('live-qr');
        }

        function renderLiveQR(el) {
            el.innerHTML = `
                <div class="max-w-xl mx-auto text-center">
                    <div class="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-100 mb-10">
                        <div class="flex justify-between items-center mb-10">
                            <div class="text-left">
                                <p class="text-[10px] font-black text-blue-600 uppercase tracking-wider">${liveSession.cohort}</p>
                                <h3 class="text-2xl font-black">Gate ${liveSession.sessionIndex + 1}</h3>
                            </div>
                            <div class="text-right">
                                <h3 id="timer-display" class="text-xl font-black font-mono text-red-600">15:00</h3>
                                <p class="text-[10px] font-black text-slate-400 uppercase">Expires in</p>
                            </div>
                        </div>
                        <div id="qrcode" class="mb-10 p-6 inline-block bg-white border-2 border-slate-50 rounded-[3rem]"></div>
                        <p class="text-slate-400 text-sm font-medium mb-10">Scan to mark attendance. Code updates automatically.</p>
                        <button onclick="openStudentView()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black shadow-lg shadow-blue-500/30">OPEN SCAN SIMULATOR</button>
                    </div>
                    <button onclick="switchView('dashboard')" class="text-slate-400 font-bold text-sm">Close Session Early</button>
                </div>
            `;
            setTimeout(() => {
                new QRCode(document.getElementById("qrcode"), { text: `sess_${Date.now()}`, width: 220, height: 220, colorDark: "#0f172a" });
                if(timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    const diff = liveSession.expiry - Date.now();
                    if (diff <= 0) { clearInterval(timerInterval); switchView('dashboard'); return; }
                    const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
                    document.getElementById('timer-display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            }, 50);
        }

        function openStudentView() {
            const modal = document.getElementById('student-view');
            const select = document.getElementById('student-select');
            const list = students.filter(s => s.cohort === liveSession.cohort && s.sessions[liveSession.sessionIndex] === 0);
            select.innerHTML = '<option value="">Who are you?</option>';
            list.forEach(s => {
                const opt = document.createElement('option'); opt.value = s.id; opt.innerText = `${s.firstName} ${s.lastName} (${s.matric})`; select.appendChild(opt);
            });
            modal.classList.remove('hidden');
        }

        function closeStudentView() { document.getElementById('student-view').classList.add('hidden'); }

        function submitStudentAttendance() {
            const sid = document.getElementById('student-select').value;
            if(!sid) return;
            const s = students.find(x => x.id === sid);
            s.sessions[liveSession.sessionIndex] = 1;
            showToast(`Attendance marked for ${s.firstName}!`);
            closeStudentView();
        }

        function showToast(m) {
            const t = document.getElementById('toast'); document.getElementById('toast-text').innerText = m;
            t.classList.remove('translate-y-32'); setTimeout(() => t.classList.add('translate-y-32'), 3000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
