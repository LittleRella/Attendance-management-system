<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX | Advanced Admin & Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .session-dot { width: 10px; height: 10px; border-radius: 2px; }
        .present { background-color: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .absent { background-color: #e2e8f0; }
        
        #qrcode img { margin: 0 auto; border: 12px solid white; border-radius: 24px; }
        .timer-animate { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-slate-950 text-white p-6 fixed h-full flex flex-col z-30 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/40"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
                <h1 class="font-black text-xl tracking-tighter">ATTENDX</h1>
            </div>
            
            <nav class="space-y-1 flex-1">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Dashboard</span>
                </button>
                <button onclick="switchView('students')" id="btn-students" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Registry</span>
                </button>
                <button onclick="switchView('courses')" id="btn-courses" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Manage Courses</span>
                </button>
                <button onclick="switchView('matrix')" id="btn-matrix" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i>
                    <span class="font-bold text-sm">Session Matrix</span>
                </button>
            </nav>

            <div class="mt-auto space-y-4">
                <button onclick="switchView('qr-launcher')" id="btn-qr" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-sm font-black shadow-xl shadow-blue-900/40 transition-all active:scale-95">
                    <i data-lucide="qr-code" class="w-5 h-5"></i> ACTIVATE QR
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="ml-64 flex-1 p-10 transition-all duration-300">
            <header id="main-header" class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-black text-slate-900 tracking-tight">Dashboard</h2>
                    <p id="page-subtitle" class="text-slate-400 text-sm font-medium">Monitoring academic compliance.</p>
                </div>
                <div class="flex items-center gap-3" id="header-actions">
                    <select id="global-course-filter" onchange="refreshView()" class="bg-white border-2 border-slate-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-blue-600 transition-all cursor-pointer">
                        <option value="ALL">All Courses</option>
                    </select>
                </div>
            </header>

            <div id="view-container" class="fade-in"></div>
        </main>
    </div>

    <!-- Student Scanning View Overlay (Simulated App) -->
    <div id="student-view" class="fixed inset-0 bg-slate-50 z-[100] hidden flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-md bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="user-check" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">Student Check-in</h2>
            <p id="student-view-info" class="text-slate-500 text-sm mb-8">Please select your name to verify attendance.</p>
            
            <div class="space-y-6 text-left">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Select Your Name</label>
                    <select id="student-select" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600 appearance-none">
                        <option value="">Choose from list...</option>
                    </select>
                </div>
                <button onclick="submitStudentAttendance()" class="w-full bg-slate-950 text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition-all">
                    CONFIRM ATTENDANCE
                </button>
                <button onclick="closeStudentView()" class="w-full text-slate-400 font-bold text-sm mt-4">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-[1.5rem] shadow-2xl flex items-center gap-4 transform translate-y-32 transition-transform duration-500 z-50 border border-slate-800">
        <div class="bg-blue-500 p-1.5 rounded-lg"><i data-lucide="bell" class="w-4 h-4"></i></div>
        <span id="toast-text" class="text-sm font-bold">Action successful</span>
    </div>

    <script>
        // --- DATA STATE ---
        let courses = [
            { id: 'c1', code: 'CSC101', name: 'Intro to Programming' },
            { id: 'c2', code: 'PHY201', name: 'General Physics II' }
        ];

        let students = [
            { id: 's1', matric: '24/CSC/001', firstName: 'Faith', lastName: 'Okon', courseCode: 'CSC101', sessions: Array(22).fill(0), pic: 'https://i.pravatar.cc/150?u=1' },
            { id: 's2', matric: '24/CSC/002', firstName: 'John', lastName: 'Smith', courseCode: 'CSC101', sessions: Array(22).fill(0), pic: 'https://i.pravatar.cc/150?u=2' },
            { id: 's3', matric: '24/PHY/005', firstName: 'Amara', lastName: 'Cole', courseCode: 'PHY201', sessions: Array(22).fill(0), pic: 'https://i.pravatar.cc/150?u=3' }
        ];

        let activeView = 'dashboard';
        let liveSession = null;
        let timerInterval = null;

        // --- CORE NAVIGATION ---
        function switchView(view) {
            activeView = view;
            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('bg-blue-600', 'text-white'));
            updateGlobalFilterOptions();
            
            if (view === 'dashboard') {
                title.innerText = "Dashboard Overview";
                subtitle.innerText = "General statistics and student compliance.";
                document.getElementById('btn-dashboard').classList.add('bg-blue-600', 'text-white');
                renderDashboard(container);
            } else if (view === 'students') {
                title.innerText = "Student Registry";
                subtitle.innerText = "Manage and edit student information.";
                document.getElementById('btn-students').classList.add('bg-blue-600', 'text-white');
                renderRegistry(container);
            } else if (view === 'courses') {
                title.innerText = "Course Management";
                subtitle.innerText = "Add, edit, or remove academic modules.";
                document.getElementById('btn-courses').classList.add('bg-blue-600', 'text-white');
                renderCourses(container);
            } else if (view === 'matrix') {
                title.innerText = "Attendance Matrix";
                subtitle.innerText = "Visual grid of all 22 sessions.";
                document.getElementById('btn-matrix').classList.add('bg-blue-600', 'text-white');
                renderMatrix(container);
            } else if (view === 'qr-launcher') {
                title.innerText = "QR Activation Center";
                renderQRLauncher(container);
            } else if (view === 'live-qr') {
                title.innerText = "Active QR Session";
                renderLiveQR(container);
            }
            lucide.createIcons();
        }

        function refreshView() { switchView(activeView); }

        function updateGlobalFilterOptions() {
            const select = document.getElementById('global-course-filter');
            const currentVal = select.value;
            select.innerHTML = '<option value="ALL">All Courses</option>';
            courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.code;
                opt.innerText = `${c.code} - ${c.name}`;
                select.appendChild(opt);
            });
            select.value = courses.some(c => c.code === currentVal) ? currentVal : 'ALL';
        }

        // --- DASHBOARD ---
        function renderDashboard(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.courseCode === filter);
            const totalSessPossible = list.length * 22;
            const actualPresent = list.reduce((acc, s) => acc + s.sessions.filter(v => v === 1).length, 0);
            const rate = totalSessPossible ? ((actualPresent / totalSessPossible) * 100).toFixed(1) : 0;

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Attendance Rate</p>
                        <h3 class="text-4xl font-black text-blue-600">${rate}%</h3>
                        <div class="mt-4 w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600" style="width: ${rate}%"></div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Students</p>
                        <h3 class="text-4xl font-black text-slate-900">${list.length}</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Modules</p>
                        <h3 class="text-4xl font-black text-slate-900">${courses.length}</h3>
                    </div>
                </div>
            `;
        }

        // --- COURSES ---
        function renderCourses(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <h4 class="font-black text-lg mb-6">Add Module</h4>
                        <div class="space-y-4">
                            <input id="new-course-code" placeholder="CSC101" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                            <input id="new-course-name" placeholder="Course Title" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-blue-600">
                            <button onclick="addCourse()" class="w-full bg-slate-950 text-white py-4 rounded-2xl font-black hover:bg-blue-600 transition-all">Add Course</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                <tr><th class="px-8 py-5">Code</th><th class="px-8 py-5">Name</th><th class="px-8 py-5 text-right">Action</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${courses.map(c => `
                                    <tr>
                                        <td class="px-8 py-5 font-black text-blue-600">${c.code}</td>
                                        <td class="px-8 py-5 font-bold text-slate-700">${c.name}</td>
                                        <td class="px-8 py-5 text-right">
                                            <button onclick="deleteCourse('${c.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function addCourse() {
            const code = document.getElementById('new-course-code').value.trim().toUpperCase();
            const name = document.getElementById('new-course-name').value.trim();
            if (!code || !name) return showToast("Fields required");
            courses.push({ id: 'c' + Date.now(), code, name });
            showToast("Course added");
            refreshView();
        }

        function deleteCourse(id) {
            courses = courses.filter(c => c.id !== id);
            refreshView();
        }

        // --- REGISTRY ---
        function renderRegistry(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.courseCode === filter);
            el.innerHTML = `
                <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                            <tr><th class="px-8 py-5">Student</th><th class="px-8 py-5">Matric No.</th><th class="px-8 py-5">Course</th><th class="px-8 py-5 text-right">Action</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${list.map(s => `
                                <tr>
                                    <td class="px-8 py-5 flex items-center gap-3">
                                        <img src="${s.pic}" class="w-8 h-8 rounded-lg">
                                        <span class="font-bold text-sm text-slate-800">${s.firstName} ${s.lastName}</span>
                                    </td>
                                    <td class="px-8 py-5 font-mono text-xs text-slate-400">${s.matric}</td>
                                    <td class="px-8 py-5">
                                        <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">${s.courseCode}</span>
                                    </td>
                                    <td class="px-8 py-5 text-right">
                                        <button onclick="deleteStudent('${s.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="user-minus" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            lucide.createIcons();
        }

        function deleteStudent(id) {
            students = students.filter(s => s.id !== id);
            refreshView();
        }

        // --- MATRIX ---
        function renderMatrix(el) {
            const filter = document.getElementById('global-course-filter').value;
            const list = filter === 'ALL' ? students : students.filter(s => s.courseCode === filter);
            el.innerHTML = `
                <div class="bg-white rounded-[2.5rem] border border-slate-100 p-8 shadow-sm">
                    <div class="space-y-4">
                        ${list.map(s => `
                            <div class="flex items-center gap-6 p-4 bg-slate-50 rounded-2xl">
                                <div class="w-40 shrink-0">
                                    <p class="font-bold text-slate-800 text-sm truncate">${s.firstName} ${s.lastName}</p>
                                    <p class="text-[9px] font-black text-slate-400 uppercase">${s.courseCode}</p>
                                </div>
                                <div class="flex-1 flex gap-1.5 overflow-x-auto no-scrollbar">
                                    ${s.sessions.map((v, i) => `
                                        <div class="session-dot ${v === 1 ? 'present' : 'absent'}"></div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- QR & STUDENT INTERACTION ---
        function renderQRLauncher(el) {
            el.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-12 rounded-[3rem] border border-slate-100 shadow-xl text-center">
                    <h3 class="text-3xl font-black text-slate-900 mb-2">Activate Attendance</h3>
                    <p class="text-slate-400 mb-10 font-medium">Select a module to generate QR.</p>
                    <div class="grid grid-cols-2 gap-6 mb-8 text-left">
                        <select id="launch-course" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold">
                            ${courses.map(c => `<option value="${c.code}">${c.code}</option>`).join('')}
                        </select>
                        <select id="launch-session" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold">
                            ${Array.from({length: 22}, (_, i) => `<option value="${i+1}">Session ${i+1}</option>`).join('')}
                        </select>
                    </div>
                    <button onclick="startQRSession()" class="w-full bg-slate-950 text-white py-5 rounded-[2rem] font-black text-lg hover:bg-blue-600 transition-all">GENERATE QR</button>
                </div>
            `;
        }

        function startQRSession() {
            const course = document.getElementById('launch-course').value;
            const sessionNum = parseInt(document.getElementById('launch-session').value);
            liveSession = {
                course: course,
                sessionIndex: sessionNum - 1,
                expiry: Date.now() + (15 * 60 * 1000)
            };
            switchView('live-qr');
        }

        function renderLiveQR(el) {
            el.innerHTML = `
                <div class="max-w-xl mx-auto text-center">
                    <div class="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-100 relative mb-10">
                        <div class="flex justify-between items-start mb-10">
                            <div class="text-left"><p class="text-[10px] font-black text-blue-600 uppercase">${liveSession.course}</p><h3 class="text-2xl font-black">Session ${liveSession.sessionIndex + 1}</h3></div>
                            <div class="text-right"><p class="text-[10px] font-black text-red-500 uppercase timer-animate tracking-widest">Active</p><h3 id="timer-display" class="text-2xl font-black font-mono">15:00</h3></div>
                        </div>
                        <div id="qrcode" class="mb-10 p-4 inline-block bg-slate-50 rounded-[2.5rem]"></div>
                        
                        <div class="p-4 bg-yellow-50 rounded-2xl border border-yellow-100 text-sm font-bold text-yellow-700 flex items-center gap-3 justify-center mb-6">
                            <i data-lucide="info" class="w-4 h-4"></i>
                            Students: Scan with phone to open selection list
                        </div>

                        <button onclick="openStudentView()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black shadow-xl shadow-blue-500/30">SIMULATE STUDENT SCAN</button>
                    </div>
                    <button onclick="endLiveSession()" class="text-slate-400 hover:text-red-500 font-black text-sm">END SESSION</button>
                </div>
            `;
            setTimeout(() => {
                new QRCode(document.getElementById("qrcode"), { text: "student-scan-token", width: 220, height: 220, colorDark: "#020617", colorLight: "#f8fafc" });
                startTimer();
                lucide.createIcons();
            }, 100);
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = liveSession.expiry - Date.now();
                if (diff <= 0) { clearInterval(timerInterval); endLiveSession(); return; }
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function endLiveSession() { clearInterval(timerInterval); liveSession = null; switchView('dashboard'); }

        // --- STUDENT VIEW LOGIC ---
        function openStudentView() {
            if (!liveSession) return;
            const modal = document.getElementById('student-view');
            const select = document.getElementById('student-select');
            
            // Filter only students in this course who haven't signed yet
            const candidates = students.filter(s => s.courseCode === liveSession.course && s.sessions[liveSession.sessionIndex] === 0);
            
            select.innerHTML = '<option value="">Choose from list...</option>';
            candidates.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.innerText = `${s.firstName} ${s.lastName} (${s.matric})`;
                select.appendChild(opt);
            });

            document.getElementById('student-view-info').innerText = `Signing in for ${liveSession.course} - Session ${liveSession.sessionIndex + 1}`;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeStudentView() {
            document.getElementById('student-view').classList.add('hidden');
        }

        function submitStudentAttendance() {
            const sid = document.getElementById('student-select').value;
            if (!sid) return showToast("Please select your name");
            
            const student = students.find(s => s.id === sid);
            student.sessions[liveSession.sessionIndex] = 1;
            
            showToast(`Attendance recorded for ${student.firstName}!`);
            closeStudentView();
            // In a real app, the admin dashboard would update via websockets/polling. 
            // Here we just keep the live view running.
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            t.classList.remove('translate-y-32'); t.classList.add('translate-y-0');
            setTimeout(() => { t.classList.remove('translate-y-0'); t.classList.add('translate-y-32'); }, 3000);
        }

        window.onload = () => switchView('dashboard');
    </script>
</body>
</html>
